<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Cost Analysis — ปทุมธานีคอนกรีต 2564-2568</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#fff;--surface:#f8fafc;--surface2:#f1f5f9;--border:#e2e8f0;--text:#1e293b;--text-dim:#64748b;--accent:#2563eb;--accent2:#0891b2;--gold:#b45309;--green:#059669;--red:#dc2626;--pink:#db2777;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{padding:24px 40px 16px;background:linear-gradient(135deg,#eff6ff,#e0e7ff,#f0f9ff);border-bottom:1px solid var(--border)}
header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#1e293b,#2563eb,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .subtitle{font-size:13px;color:var(--text-dim);margin-top:2px}

/* View tabs */
.view-tabs{display:flex;gap:0;padding:0 40px;background:var(--surface);border-bottom:1px solid var(--border)}
.view-tab{padding:12px 28px;border:none;background:transparent;color:var(--text-dim);font-family:'Sarabun';font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.view-tab:hover{color:var(--text);background:rgba(37,99,235,.03)}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Sankey controls */
.controls{display:flex;align-items:center;gap:12px;padding:14px 40px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.year-tabs{display:flex;gap:3px;background:var(--bg);padding:3px;border-radius:9px;border:1px solid var(--border)}
.year-tab{padding:7px 18px;border:none;background:transparent;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .2s}
.year-tab:hover{color:var(--text);background:var(--surface2)}
.year-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.2)}
.stats-bar{margin-left:auto;display:flex;gap:16px;font-family:'JetBrains Mono',monospace;font-size:12px}
.stat{display:flex;flex-direction:column;align-items:flex-end}
.stat-label{color:var(--text-dim);font-size:10px;font-family:'Sarabun'}
.stat-value{color:var(--accent);font-weight:600}
.axis-bar{display:flex;align-items:center;gap:12px;padding:12px 40px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.axis-group{display:flex;align-items:center;gap:6px}
.axis-label{font-size:13px;font-weight:600;color:var(--text-dim);white-space:nowrap}
.axis-select{padding:7px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:'Sarabun';font-size:13px;font-weight:500;cursor:pointer;outline:none;transition:border-color .2s;min-width:160px}
.axis-select:focus{border-color:var(--accent)}
.swap-btn{padding:6px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);cursor:pointer;font-size:16px;transition:all .2s;color:var(--text-dim)}
.swap-btn:hover{border-color:var(--accent);background:rgba(37,99,235,.04);color:var(--accent)}

#sankey-container{width:100%;padding:16px 30px;min-height:500px}
#sankey-svg{width:100%;height:700px}
.node text{font-family:'Sarabun';font-size:11px;fill:var(--text);pointer-events:none;font-weight:600}

.tooltip{position:fixed;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1000;box-shadow:0 8px 28px rgba(0,0,0,.1);max-width:380px;backdrop-filter:blur(12px)}
.tooltip.show{opacity:1}
.tooltip .tt-title{font-weight:700;margin-bottom:5px;font-size:13px;color:var(--accent)}
.tooltip .tt-row{display:flex;justify-content:space-between;gap:14px;padding:2px 0}
.tooltip .tt-label{color:var(--text-dim)}.tooltip .tt-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--gold)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:800px;width:93%;max-height:82vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.4,0,.2,1);box-shadow:0 20px 50px rgba(0,0,0,.12)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.modal-header h2{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-header .modal-sub{font-size:12px;color:var(--text-dim);margin-top:3px}
.modal-close{background:var(--surface);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.modal-close:hover{background:var(--surface2);border-color:var(--accent)}
.drill-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.drill-table thead th{background:var(--surface);padding:8px 12px;text-align:left;font-weight:600;color:var(--text-dim);border-bottom:2px solid var(--border);position:sticky;top:0}
.drill-table thead th:last-child{text-align:right}
.drill-table tbody td{padding:6px 12px;border-bottom:1px solid rgba(226,232,240,.5)}
.drill-table tbody td:last-child{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600}
.drill-table tbody td.neg{color:var(--red)}
.drill-table tbody tr:hover td{background:rgba(37,99,235,.03)}
.yoy-up{color:var(--red);font-weight:600;font-size:11px}
.yoy-down{color:var(--green);font-weight:600;font-size:11px}
.yoy-new{color:var(--accent);font-weight:600;font-size:11px}
.yoy-na{color:var(--text-dim);font-size:11px}
.yoy-header{display:flex;gap:16px;margin-bottom:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;justify-content:space-between}
.yoy-header .yoy-item{display:flex;flex-direction:column;align-items:center}
.yoy-header .yoy-label{font-size:10px;color:var(--text-dim)}
.yoy-header .yoy-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px}
.yoy-header .yoy-change{font-size:12px;font-weight:600;margin-top:2px}
.drill-total{display:flex;justify-content:space-between;margin-top:14px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-weight:700}
.drill-total .val{font-family:'JetBrains Mono',monospace;color:var(--green);font-size:15px}
.drill-total .val.neg{color:var(--red)}
.bar-bg{height:5px;background:var(--surface2);border-radius:3px;width:100%}
.bar-fill{height:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;margin-top:3px;transition:width .4s}
.bar-fill.neg-bar{background:linear-gradient(90deg,var(--red),var(--pink))}
.neg-note{padding:6px 40px;font-size:11px;color:var(--text-dim)}.neg-note span{color:var(--red);font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 40px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}

/* Chart view */
.chart-controls{padding:16px 40px;border-bottom:1px solid var(--border);display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
.toggle-section{flex:1;min-width:280px}
.toggle-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.toggle-title button{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text-dim);cursor:pointer;font-family:'Sarabun'}
.toggle-title button:hover{border-color:var(--accent);color:var(--accent)}
.toggle-grid{display:flex;flex-wrap:wrap;gap:6px}
.toggle-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;cursor:pointer;transition:all .15s;user-select:none;background:var(--bg)}
.toggle-chip:hover{border-color:var(--accent)}
.toggle-chip.active{border-color:var(--accent);background:rgba(37,99,235,.06);font-weight:600}
.toggle-chip .chip-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.toggle-chip.active .chip-dot{box-shadow:0 0 0 2px rgba(37,99,235,.3)}
.toggle-chip.no-data{opacity:.35;border-style:dashed}
#chart-container{padding:20px 40px 20px 0;position:relative}
#areaChart{width:100%!important;height:480px!important}
.chart-legend{padding:8px 40px 16px;max-height:100px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid var(--border)}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text);cursor:default}
.chart-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-tt{position:fixed;background:rgba(255,255,255,.97);border:1px solid #e2e8f0;border-radius:10px;padding:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:1200;box-shadow:0 8px 28px rgba(0,0,0,.1);font-family:'Sarabun',sans-serif;min-width:200px;max-width:380px;backdrop-filter:blur(12px)}
.chart-tt.show{opacity:1}
.chart-tt.pinned{pointer-events:auto}
.chart-tt-title{padding:10px 14px 6px;font-weight:700;font-size:13px;color:#1e293b;border-bottom:1px solid #f1f5f9}
.chart-tt-body{max-height:260px;overflow-y:auto;padding:6px 0}
.chart-tt-row{display:flex;align-items:center;gap:8px;padding:3px 14px;font-size:11px}
.chart-tt-row:hover{background:#f8fafc}
.chart-tt-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.chart-tt-name{flex:1;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-tt-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:#1e293b;white-space:nowrap}
.chart-tt-yoy{font-size:10px;font-weight:600;white-space:nowrap}
.chart-tt-yoy.up{color:#dc2626}.chart-tt-yoy.down{color:#059669}
.chart-tt-footer{padding:6px 14px;border-top:1px solid #f1f5f9;font-size:11px;font-weight:700;display:flex;justify-content:space-between;color:#1e293b}
.chart-tt-hint{padding:4px 14px 8px;font-size:10px;color:#94a3b8}
.y-axis-bar{position:absolute;top:20px;left:8px;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:10}
.lock-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.lock-btn:hover{border-color:var(--accent);background:rgba(37,99,235,.04)}
.lock-btn.locked{border-color:var(--gold);background:rgba(245,158,11,.08)}
.scale-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);white-space:nowrap}
.toggle-monthly-btn{padding:7px 16px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:'Sarabun';font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.toggle-monthly-btn:hover{border-color:var(--accent);background:rgba(37,99,235,.04)}
.toggle-monthly-btn.active{border-color:var(--accent);background:rgba(37,99,235,.08);color:var(--accent)}

.hidden{display:none!important}

/* Treemap */
.tm-controls{padding:14px 40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tm-year-tabs{display:flex;gap:3px;background:var(--bg);padding:3px;border-radius:9px;border:1px solid var(--border)}
.tm-year-tab{padding:7px 18px;border:none;background:transparent;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .2s;position:relative}
.tm-year-tab:hover{color:var(--text);background:var(--surface2)}
.tm-year-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.tm-year-info{margin-left:12px;font-size:12px;color:var(--text-dim);font-family:'Sarabun';display:flex;align-items:center;gap:4px}
.tm-year-info .badge{background:var(--accent);color:#fff;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;font-family:'JetBrains Mono'}
.tm-wrapper{display:flex;gap:16px;padding:16px 40px;flex-wrap:wrap}
.tm-panel{flex:1;min-width:400px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg)}
.tm-breadcrumb{display:flex;gap:4px;align-items:center;font-size:12px;color:var(--accent);flex-wrap:wrap;padding:10px 14px 6px}
.tm-breadcrumb span{cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s;color:var(--accent);font-weight:500}
.tm-breadcrumb span:hover{background:rgba(37,99,235,.08);color:var(--accent)}
.tm-breadcrumb .sep{cursor:default;color:var(--accent);opacity:.4}
.tm-container{position:relative;height:420px;overflow:hidden}
.tm-cell{position:absolute;overflow:hidden;cursor:pointer;transition:opacity .15s;border:1px solid rgba(255,255,255,.6)}
.tm-cell:hover{opacity:.85;z-index:2}
.tm-cell-inner{padding:5px 7px;height:100%;display:flex;flex-direction:column;font-size:13px;color:#1e293b;overflow:hidden}
.tm-cell-name{font-weight:700;font-size:14px;line-height:1.2;word-break:break-word}
.tm-cell-val{font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.8;margin-top:2px}
.tm-cell-pct{font-size:12px;opacity:.7}
.tm-cell-yoy{font-size:12px;font-weight:600;margin-top:1px}
.tm-cell-yoy.up{color:#dc2626}.tm-cell-yoy.down{color:#059669}
.pareto-container{padding:8px 10px;border-top:1px solid var(--border);height:220px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Heatmap */
.hm-controls{padding:14px 40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hm-year-tabs{display:flex;gap:3px;background:var(--bg);padding:3px;border-radius:9px;border:1px solid var(--border)}
.hm-year-tab{padding:7px 18px;border:none;background:transparent;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .2s}
.hm-year-tab:hover{color:var(--text);background:var(--surface2)}
.hm-year-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.2)}
.hm-base-tabs .hm-year-tab.active{background:linear-gradient(135deg,var(--text-dim),#94a3b8);box-shadow:0 2px 10px rgba(100,116,139,.2)}
.hm-base-tabs .hm-year-tab.hm-self{opacity:.4}
.hm-base-tabs .hm-year-tab.hm-self.active{opacity:.7}
.hm-info{font-size:12px;color:var(--text-dim);font-family:'Sarabun';display:flex;align-items:center;gap:4px}
.hm-info .badge{background:var(--accent);color:#fff;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;font-family:'JetBrains Mono'}
.hm-legend{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text-dim)}
.hm-legend .hm-leg-item{display:flex;align-items:center;gap:5px}
.hm-legend .hm-leg-grad{width:80px;height:11px;border-radius:3px}
.hm-legend .hm-leg-grad.up{background:linear-gradient(90deg,#fde2e2,#dc2626)}
.hm-legend .hm-leg-grad.down{background:linear-gradient(90deg,#d1f0e0,#059669)}

.hm-wrapper{padding:16px 40px 40px}
.hm-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--bg)}
.hm-table{border-collapse:separate;border-spacing:0;width:100%;min-width:900px;font-size:11px}
.hm-table th,.hm-table td{padding:0;border-right:1px solid rgba(226,232,240,.7);border-bottom:1px solid rgba(226,232,240,.7)}
.hm-table th:last-child,.hm-table td:last-child{border-right:none}
.hm-table tr:last-child td{border-bottom:none}
/* corner */
.hm-corner{position:sticky;left:0;z-index:6;background:var(--surface2);text-align:left;padding:8px 12px!important;font-weight:700;color:var(--text-dim);font-size:11px;min-width:140px;border-bottom:2px solid var(--border)!important;border-right:2px solid var(--border)!important}
/* column headers */
.hm-table thead th.hm-col{position:sticky;top:0;z-index:4;background:var(--surface);color:var(--text);font-weight:600;padding:8px 6px!important;text-align:center;vertical-align:bottom;line-height:1.25;border-bottom:2px solid var(--border)!important;min-width:92px}
.hm-table thead th.hm-col .hm-col-rank{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;color:#fff;background:var(--text-dim);border-radius:8px;padding:0 5px;margin-bottom:3px}
.hm-table thead th.hm-col .hm-col-name{font-size:10.5px}
/* total column header */
.hm-table thead th.hm-total-h{position:sticky;top:0;z-index:4;background:var(--surface2);color:var(--text);font-weight:700;padding:8px 6px!important;text-align:center;vertical-align:bottom;border-bottom:2px solid var(--border)!important;border-left:2px solid var(--border)!important;min-width:96px}
/* row header */
.hm-table tbody th.hm-row{position:sticky;left:0;z-index:5;background:var(--surface);text-align:left;padding:6px 12px!important;font-weight:600;color:var(--text);border-right:2px solid var(--border)!important;min-width:140px;white-space:nowrap}
.hm-table tbody th.hm-row .hm-row-rank{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;color:#fff;background:var(--text-dim);border-radius:8px;padding:0 5px;margin-right:5px}
/* data cells */
.hm-cell{text-align:center;cursor:default;transition:filter .15s;vertical-align:middle}
.hm-cell:hover{filter:brightness(.93)}
.hm-cell .hm-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;line-height:1.2;display:block;padding-top:6px}
.hm-cell .hm-yoy{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;line-height:1.2;display:block;padding-bottom:6px;margin-top:1px}
.hm-cell .hm-yoy.up{color:var(--red)}
.hm-cell .hm-yoy.down{color:var(--green)}
.hm-cell .hm-yoy.flat{color:var(--text-dim)}
.hm-cell .hm-yoy.na{color:#cbd5e1}
.hm-cell.empty .hm-val{color:#cbd5e1;font-weight:400}
/* total column cells */
.hm-cell.hm-total{border-left:2px solid var(--border)!important;background:var(--surface2)}
.hm-cell.hm-total .hm-val{color:var(--text)}
/* total row */
.hm-table tr.hm-total-row th,.hm-table tr.hm-total-row td{border-top:2px solid var(--border)!important;background:var(--surface2)}
.hm-table tr.hm-total-row th.hm-row{color:var(--text);font-weight:700}
.hm-table tr.hm-total-row .hm-cell .hm-val{color:var(--text)}
@media(max-width:768px){.hm-controls,.hm-wrapper{padding-left:16px;padding-right:16px}}
@media(max-width:768px){header,.controls,.axis-bar,.chart-controls,.view-tabs{padding-left:16px;padding-right:16px}#sankey-container,#chart-container{padding:8px}.stats-bar{display:none}header h1{font-size:19px}.legend,.neg-note{padding-left:16px;padding-right:16px}}
</style>
</head>

<script>
let RECORDS=[];

const DIM_LABELS={d:'ฝ่าย/แผนก',c:'หมวดค่าใช้จ่าย',a:'ชื่อบัญชี',p:'ผลิตภัณฑ์'};
const DIM_KEYS=['d','c','a','p'];
const YEARS=['2564','2565','2566','2567','2568'];
let currentYear='2564';
let currentView='treemap';

// Sankey colors (original bright)
const SANKEY_PALETTE=['#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#f97316','#14b8a6','#6366f1','#d946ef','#eab308','#84cc16','#f43f5e','#0ea5e9','#a855f7','#22c55e','#fb7185','#a78bfa','#38bdf8','#facc15','#f472b6','#4ade80','#818cf8','#fb923c','#2dd4bf','#e879f9','#fbbf24','#60a5fa','#34d399'];
// Chart colors (soft pastel)
const CHART_PALETTE = SANKEY_PALETTE;
const SANKEY_CAT_COLORS={'1.เงินเดือน':'#3b82f6','2.ค่าล่วงเวลา':'#06b6d4','3.ค่าซ่อมแซมและค่าบำรุงรักษา':'#10b981','4.โบนัส':'#f59e0b','5.ค่าใช้จ่าย FC อื่น':'#ef4444','6.ค่านายหน้า':'#ec4899','7.ประมาณการ คชจ.พนง.':'#8b5cf6','8.ค่าเสื่อมราคา':'#f97316'};
const CHART_CAT_COLORS = SANKEY_CAT_COLORS;
const nodeColorCache={};
function getNodeColor(name){if(!nodeColorCache[name])nodeColorCache[name]=SANKEY_PALETTE[Object.keys(nodeColorCache).length%SANKEY_PALETTE.length];return nodeColorCache[name]}
function fmtNum(n){const abs=Math.abs(n),pre=n<0?'-':'';if(abs>=1e6)return pre+(abs/1e6).toFixed(2)+'M';if(abs>=1e3)return pre+(abs/1e3).toFixed(1)+'K';return pre+abs.toFixed(0)}
function fmtFull(n){return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}

// ============ VIEW SWITCHING ============
function switchView(v){
  currentView=v;
  document.getElementById('vtSankey').classList.toggle('active',v==='sankey');
  document.getElementById('vtChart').classList.toggle('active',v==='chart');
  document.getElementById('vtTreemap').classList.toggle('active',v==='treemap');
  document.getElementById('vtHeatmap').classList.toggle('active',v==='heatmap');
  document.getElementById('sankey-view').classList.toggle('hidden',v!=='sankey');
  document.getElementById('chart-view').classList.toggle('hidden',v!=='chart');
  document.getElementById('treemap-view').classList.toggle('hidden',v!=='treemap');
  document.getElementById('heatmap-view').classList.toggle('hidden',v!=='heatmap');
  if(v==='sankey') renderSankey();
  if(v==='chart') renderChart();
  if(v==='treemap') renderTreemaps();
  if(v==='heatmap') renderHeatmap();
}

// ============ SANKEY ============
const tabsEl=document.getElementById('yearTabs');
/* year-tabs build moved into boot() */
function selectYear(y){currentYear=y;document.querySelectorAll('.year-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+y).classList.add('active');renderSankey()}
function onAxisChange(){renderSankey()}
function swapAxes(){const l=document.getElementById('leftAxis'),r=document.getElementById('rightAxis');const t=l.value;l.value=r.value;r.value=t;renderSankey()}

function aggregate(year,lK,rK){const f=RECORDS.filter(r=>r.y===year);const m={};f.forEach(r=>{const k=r[lK]+'|||'+r[rK];if(!m[k])m[k]={left:r[lK],right:r[rK],value:0};m[k].value+=r.v});return Object.values(m)}

function buildSankey(links){
  const pos=links.filter(l=>l.value>0),neg=links.filter(l=>l.value<0);
  const ls=[...new Set(links.map(l=>l.left))],rs=[...new Set(links.map(l=>l.right))];
  const lt={},rt={};links.forEach(l=>{lt[l.left]=(lt[l.left]||0)+l.value;rt[l.right]=(rt[l.right]||0)+l.value});
  ls.sort((a,b)=>(lt[b]||0)-(lt[a]||0));rs.sort((a,b)=>(rt[b]||0)-(rt[a]||0));
  const lpt={},rpt={};pos.forEach(l=>{lpt[l.left]=(lpt[l.left]||0)+l.value;rpt[l.right]=(rpt[l.right]||0)+l.value});
  const svg=document.getElementById('sankey-svg');const W=svg.getBoundingClientRect().width||1200;
  const H=Math.max(550,Math.max(ls.length,rs.length)*32);
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.height=H+'px';
  const pad={l:20,r:20,t:16,b:16},nw=16,gap=5,tpv=pos.reduce((s,l)=>s+l.value,0)||1;
  const la=H-pad.t-pad.b-(ls.length-1)*gap;let ly=pad.t;
  const ln=ls.map(n=>{const pv=lpt[n]||1;const h=Math.max(6,(pv/tpv)*la);const o={name:n,x:pad.l,y:ly,w:nw,h,total:lt[n]||0};ly+=h+gap;return o});
  const ra=H-pad.t-pad.b-(rs.length-1)*gap;let ry=pad.t;
  const rn=rs.map(n=>{const pv=rpt[n]||1;const h=Math.max(6,(pv/tpv)*ra);const o={name:n,x:W-pad.r-nw,y:ry,w:nw,h,total:rt[n]||0};ry+=h+gap;return o});
  const lo={},ro={};ls.forEach(n=>lo[n]=0);rs.forEach(n=>ro[n]=0);
  const lm={},rm={};ln.forEach(n=>lm[n.name]=n);rn.forEach(n=>rm[n.name]=n);
  const sp=[...pos].sort((a,b)=>ls.indexOf(a.left)-ls.indexOf(b.left)||rs.indexOf(a.right)-rs.indexOf(b.right));
  const fl=sp.map(l=>{const s=lm[l.left],t=rm[l.right];if(!s||!t)return null;
    const lh=Math.max(1,(l.value/tpv)*Math.min(la,ra));const sy=s.y+lo[l.left];lo[l.left]+=lh;
    const ty=t.y+ro[l.right];ro[l.right]+=lh;
    return{left:l.left,right:l.right,value:l.value,sy,sh:lh,ty,th:lh,sx:s.x+nw,tx:t.x}}).filter(Boolean);
  return{ln,rn,fl,neg,tn:links.reduce((s,l)=>s+l.value,0)};
}

function renderSankey(){
  const lK=document.getElementById('leftAxis').value,rK=document.getElementById('rightAxis').value;
  const links=aggregate(currentYear,lK,rK);const{ln,rn,fl,neg,tn}=buildSankey(links);
  document.getElementById('statTotal').textContent='฿'+fmtNum(tn);
  document.getElementById('statLeft').textContent=ln.length+' '+DIM_LABELS[lK];
  document.getElementById('statRight').textContent=rn.length+' '+DIM_LABELS[rK];
  const nn=document.getElementById('negNote');
  if(neg.length>0){nn.style.display='';nn.innerHTML=`⚠️ มีรายการติดลบ <span>${neg.length} คู่</span> รวม <span>${fmtFull(neg.reduce((s,l)=>s+l.value,0))} บาท</span>`}else nn.style.display='none';
  const le=document.getElementById('legend');le.innerHTML='';
  rn.forEach(n=>{const c=getNodeColor(rK+'_'+n.name);le.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${n.name.length>20?n.name.substring(0,20)+'…':n.name}</div>`});
  const svg=document.getElementById('sankey-svg');svg.innerHTML='';const ns='http://www.w3.org/2000/svg';
  const defs=document.createElementNS(ns,'defs');svg.appendChild(defs);
  fl.forEach((f,i)=>{const g=document.createElementNS(ns,'linearGradient');g.id='lg-'+i;g.setAttribute('gradientUnits','userSpaceOnUse');g.setAttribute('x1',f.sx);g.setAttribute('x2',f.tx);const s1=document.createElementNS(ns,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',getNodeColor(lK+'_'+f.left));const s2=document.createElementNS(ns,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',getNodeColor(rK+'_'+f.right));g.appendChild(s1);g.appendChild(s2);defs.appendChild(g)});
  const lg=document.createElementNS(ns,'g');svg.appendChild(lg);
  fl.forEach((f,i)=>{const mx=(f.sx+f.tx)/2;const d=`M${f.sx},${f.sy} C${mx},${f.sy} ${mx},${f.ty} ${f.tx},${f.ty} L${f.tx},${f.ty+f.th} C${mx},${f.ty+f.th} ${mx},${f.sy+f.sh} ${f.sx},${f.sy+f.sh} Z`;
    const p=document.createElementNS(ns,'path');p.setAttribute('d',d);p.setAttribute('fill',`url(#lg-${i})`);p.setAttribute('opacity','0.3');p.setAttribute('class','sankey-link');p.setAttribute('data-left',f.left);p.setAttribute('data-right',f.right);p.style.cursor='pointer';p.style.transition='opacity .2s';
    p.addEventListener('mouseenter',e=>{p.setAttribute('opacity','0.55');showTooltip(e,f)});p.addEventListener('mousemove',moveTooltip);p.addEventListener('mouseleave',()=>{p.setAttribute('opacity','0.3');hideTooltip()});p.addEventListener('click',()=>drillDown(f.left,f.right));lg.appendChild(p)});
  function dn(nodes,side,dk){nodes.forEach(n=>{const g=document.createElementNS(ns,'g');const r=document.createElementNS(ns,'rect');r.setAttribute('x',n.x);r.setAttribute('y',n.y);r.setAttribute('width',n.w);r.setAttribute('height',n.h);r.setAttribute('fill',getNodeColor(dk+'_'+n.name));r.setAttribute('rx','3');r.style.cursor='pointer';
    r.addEventListener('mouseenter',()=>{document.querySelectorAll('.sankey-link').forEach(l=>{l.setAttribute('opacity',l.getAttribute(side==='left'?'data-left':'data-right')===n.name?'0.55':'0.04')})});r.addEventListener('mouseleave',()=>{document.querySelectorAll('.sankey-link').forEach(l=>l.setAttribute('opacity','0.3'))});r.addEventListener('click',()=>drillDownNode(n.name,side));g.appendChild(r);
    const t=document.createElementNS(ns,'text');if(side==='left'){t.setAttribute('x',n.x+n.w+6);t.setAttribute('text-anchor','start')}else{t.setAttribute('x',n.x-6);t.setAttribute('text-anchor','end')}t.setAttribute('y',n.y+n.h/2);t.setAttribute('dy','0.35em');t.setAttribute('font-size',n.h>12?'11':'9');
    const lb=n.name.length>22?n.name.substring(0,22)+'…':n.name;t.textContent=lb+' ('+fmtNum(n.total)+')';g.appendChild(t);svg.appendChild(g)})}
  dn(ln,'left',lK);dn(rn,'right',rK);
}

// Tooltip & YoY helpers
function getPrevYear(y){const i=YEARS.indexOf(y);return i>0?YEARS[i-1]:null}
function calcYoY(c,p){if(p===null||p===undefined)return{pct:null,label:'N/A',cls:'yoy-na'};if(p===0&&c===0)return{pct:0,label:'0%',cls:'yoy-na'};if(p===0)return{pct:null,label:'ใหม่',cls:'yoy-new'};const pc=((c-p)/Math.abs(p))*100;if(pc>0)return{pct:pc,label:'▲ +'+pc.toFixed(1)+'%',cls:'yoy-up'};if(pc<0)return{pct:pc,label:'▼ '+pc.toFixed(1)+'%',cls:'yoy-down'};return{pct:0,label:'— 0%',cls:'yoy-na'}}

function showTooltip(e,fl){const lK=document.getElementById('leftAxis').value,rK=document.getElementById('rightAxis').value;const tt=document.getElementById('tooltip');const tot=RECORDS.filter(r=>r.y===currentYear).reduce((s,r)=>s+r.v,0);const pct=tot?((fl.value/tot)*100).toFixed(1):'0';
  const py=getPrevYear(currentYear);let yh='';if(py){const pv=RECORDS.filter(r=>r.y===py&&r[lK]===fl.left&&r[rK]===fl.right).reduce((s,r)=>s+r.v,0);const y=calcYoY(fl.value,pv);yh=`<div class="tt-row"><span class="tt-label">YoY (vs ${py})</span><span class="${y.cls}" style="font-family:'JetBrains Mono',monospace">${y.label}</span></div>`}
  tt.innerHTML=`<div class="tt-title">${fl.left} → ${fl.right}</div><div class="tt-row"><span class="tt-label">จำนวนเงิน</span><span class="tt-val">฿${fmtFull(fl.value)}</span></div><div class="tt-row"><span class="tt-label">สัดส่วน</span><span class="tt-val">${pct}%</span></div>${yh}<div style="margin-top:6px;font-size:11px;color:#64748b">🖱️ คลิกเพื่อดูรายละเอียด</div>`;tt.classList.add('show');moveTooltip(e)}
function moveTooltip(e){const tt=document.getElementById('tooltip');const gap=12;let x=e.clientX+gap,y=e.clientY-8;const tw=tt.offsetWidth||300;const th=tt.offsetHeight||140;if(x+tw>window.innerWidth)x=e.clientX-tw-gap;if(y+th>window.innerHeight)y=e.clientY-th-gap;if(y<0)y=4;tt.style.left=x+'px';tt.style.top=y+'px'}
function hideTooltip(){document.getElementById('tooltip').classList.remove('show')}

// Drill-down with YoY
function aggYear(yr,fk,fv,fk2,fv2,gk){const items=RECORDS.filter(r=>r.y===yr&&r[fk]===fv&&(!fk2||r[fk2]===fv2));const g={};items.forEach(r=>{const k=gk.map(x=>r[x]).join('|||');if(!g[k])g[k]={...Object.fromEntries(gk.map(x=>[x,r[x]])),value:0};g[k].value+=r.v});return g}
function buildYoYHeader(ct,py,pt){if(!py)return`<div class="yoy-header"><div class="yoy-item"><span class="yoy-label">ปี ${currentYear}</span><span class="yoy-val">฿${fmtFull(ct)}</span><span class="yoy-na">ปีแรก</span></div></div>`;const y=calcYoY(ct,pt),d=ct-pt;return`<div class="yoy-header"><div class="yoy-item"><span class="yoy-label">ปี ${py}</span><span class="yoy-val" style="color:var(--text-dim)">฿${fmtFull(pt)}</span></div><div class="yoy-item"><span class="yoy-label">→</span><span class="yoy-change ${y.cls}">${y.label}</span><span style="font-size:10px;color:var(--text-dim)">${d>=0?'+':''}${fmtFull(d)}</span></div><div class="yoy-item"><span class="yoy-label">ปี ${currentYear}</span><span class="yoy-val">฿${fmtFull(ct)}</span></div></div>`}

function drillDown(lv,rv){const lK=document.getElementById('leftAxis').value,rK=document.getElementById('rightAxis').value;const ok=DIM_KEYS.filter(k=>k!==lK&&k!==rK);
  const cg=aggYear(currentYear,lK,lv,rK,rv,ok);const py=getPrevYear(currentYear);const pg=py?aggYear(py,lK,lv,rK,rv,ok):{};
  const sorted=Object.values(cg).sort((a,b)=>Math.abs(b.value)-Math.abs(a.value));if(!sorted.length)return;

function swapStackFilter() {
  const tmpKey = stackByKey;
  const tmpSel = [...selectedStack];
  stackByKey = filterByKey;
  filterByKey = tmpKey;
  selectedStack = [...selectedFilter];

// Color assignment per dimension value
const DIM_COLOR_CACHE = {};
function getDimColor(dimKey, val) {
  const k = dimKey+'_'+val;
  if (!DIM_COLOR_CACHE[k]) {
    if (dimKey==='c' && CHART_CAT_COLORS[val]) DIM_COLOR_CACHE[k] = CHART_CAT_COLORS[val];
    else DIM_COLOR_CACHE[k] = CHART_PALETTE[Object.keys(DIM_COLOR_CACHE).length % CHART_PALETTE.length];
  }
  return DIM_COLOR_CACHE[k];
}

function onStackByChange() {
  const newStack = document.getElementById('stackBy').value;
  const newFilter = document.getElementById('filterBy').value;
  // Prevent same dimension
  if (newStack === newFilter) {
    // Auto-swap filter to something else
    const other = DIM_KEYS.find(k => k !== newStack);
    document.getElementById('filterBy').value = other;
    filterByKey = other;
  }
  stackByKey = newStack;
  filterByKey = document.getElementById('filterBy').value;
  selectedStack = [...ALL_VALS[stackByKey]];
  selectedFilter = new Set(ALL_VALS[filterByKey]);
  buildChartToggles();
  renderChart();
}

function onFilterByChange() {
  const newFilter = document.getElementById('filterBy').value;
  if (newFilter === stackByKey) {
    const other = DIM_KEYS.find(k => k !== newFilter);
    document.getElementById('stackBy').value = other;
    stackByKey = other;
    selectedStack = [...ALL_VALS[stackByKey]];
  }
  filterByKey = newFilter;
  selectedFilter = new Set(ALL_VALS[filterByKey]);
  buildChartToggles();
  renderChart();
}

function buildChartToggles() {
  // Compute which stack values have non-zero data for current filter selection
  const filteredRecords = RECORDS.filter(r => selectedFilter.has(r[filterByKey]));
  const activeStackVals = new Set();
  filteredRecords.forEach(r => {
    if (r.v !== 0) activeStackVals.add(r[stackByKey]);
  });

  // Filter toggles
  document.getElementById('filterTitle').innerHTML = `กรอง: ${DIM_LABELS[filterByKey]} <button onclick="toggleAllFilter(true)">ทั้งหมด</button><button onclick="toggleAllFilter(false)">ยกเลิก</button>`;
  const fEl = document.getElementById('filterToggles');
  fEl.innerHTML = '';
  ALL_VALS[filterByKey].forEach(v => {
    const chip = document.createElement('div');
    chip.className = 'toggle-chip' + (selectedFilter.has(v) ? ' active' : '');
    chip.innerHTML = `<span class="chip-dot" style="background:${getDimColor(filterByKey,v)}"></span>${v.length>25?v.substring(0,25)+'…':v}`;
    chip.onclick = () => { if(selectedFilter.has(v)) selectedFilter.delete(v); else selectedFilter.add(v); buildChartToggles(); renderChart(); };
    fEl.appendChild(chip);
  });

  // Stack toggles with grey-out
  document.getElementById('stackTitle').innerHTML = `Stack: ${DIM_LABELS[stackByKey]} <button onclick="toggleAllStack(true)">ทั้งหมด</button><button onclick="toggleAllStack(false)">ยกเลิก</button>`;
  const sEl = document.getElementById('stackToggles');
  sEl.innerHTML = '';
  ALL_VALS[stackByKey].forEach(v => {
    const isOn = selectedStack.includes(v);
    const hasData = activeStackVals.has(v);
    const chip = document.createElement('div');
    chip.className = 'toggle-chip' + (isOn ? ' active' : '') + (!hasData ? ' no-data' : '');
    const orderNum = isOn ? selectedStack.indexOf(v) + 1 : '';
    const noDataTag = '';
    chip.innerHTML = `<span class="chip-dot" style="background:${getDimColor(stackByKey,v)}"></span>${v.length>25?v.substring(0,25)+'…':v}${orderNum ? '<span style="margin-left:4px;font-size:10px;color:var(--accent);font-family:JetBrains Mono">#'+orderNum+'</span>' : ''}${noDataTag}`;
    chip.onclick = () => {
      const idx = selectedStack.indexOf(v);
      if (idx >= 0) selectedStack.splice(idx, 1);
      else selectedStack.push(v);
      buildChartToggles();
      renderChart();
    };
    sEl.appendChild(chip);
  });
}

function toggleAllFilter(on) { selectedFilter = on ? new Set(ALL_VALS[filterByKey]) : new Set(); buildChartToggles(); renderChart(); }
function toggleAllStack(on) { selectedStack = on ? [...ALL_VALS[stackByKey]] : []; buildChartToggles(); renderChart(); }

// Y-axis zoom & pan
let yLocked = false;
let yViewMin = null;
let yViewMax = null;
let isDragging = false;
let dragStartY = 0;
let dragStartMax = 0;
let currentDataMax = 0;

function toggleLock() {
  yLocked = false;
  yViewMin = null;
  yViewMax = null;
  document.getElementById('lockIcon').textContent = '🔓';
  document.getElementById('lockBtn').classList.remove('locked');
  document.getElementById('scaleLabel').textContent = 'Auto';
  renderChart();
}

function updateYView(newMin, newMax) {
  yLocked = true;
  yViewMin = Math.max(0, newMin);
  yViewMax = Math.max(yViewMin + 1, newMax);
  document.getElementById('lockIcon').textContent = '🔒';
  document.getElementById('lockBtn').classList.add('locked');
  document.getElementById('scaleLabel').textContent = yViewMin > 0
    ? '฿' + Math.round(yViewMin) + '-' + Math.round(yViewMax) + 'M'
    : '฿0-' + Math.round(yViewMax) + 'M';
  if (chartInstance) {
    chartInstance.options.scales.y.min = yViewMin;
    chartInstance.options.scales.y.max = yViewMax;
    chartInstance.update('none');
  }
}

function initDrag() {
  const canvas = document.getElementById('areaChart');

  // Y-axis drag to zoom (min stays 0, only max changes)
  canvas.addEventListener('mousedown', e => {
    if (!chartInstance) return;
    const chartArea = chartInstance.chartArea;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x > chartArea.left + 10) return;

    isDragging = true;
    dragStartY = e.clientY;
    dragStartMax = chartInstance.scales.y.max - chartInstance.scales.y.min;
    canvas.style.cursor = 'ns-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dy = e.clientY - dragStartY;
    const sensitivity = dragStartMax * 0.004;
    let newRange = dragStartMax + dy * sensitivity;
    newRange = Math.max(2, newRange);

    // Zoom anchored at 0: min=0, max=newRange
    updateYView(0, newRange);
    e.preventDefault();
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      document.getElementById('areaChart').style.cursor = '';
    }
  });

  // Manual tooltip on canvas mousemove
  canvas.addEventListener('mousemove', e => {
    if (!chartInstance || isDragging) return;
    const tt = document.getElementById('chartTt');

    // If shift tooltip is pinned, don't update (let user scroll)
    if (shiftHeld && shiftPinned) return;

    const chart = chartInstance;
    const area = chart.chartArea;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;

    // Outside chart area
    if (cx < area.left || cx > area.right || cy < area.top || cy > area.bottom) {
      tt.classList.remove('show'); return;
    }

    // Find two nearest data indices for interpolation
    const xScale = chart.scales.x;
    const xPositions = YEARS.map((_, i) => xScale.getPixelForValue(i));
    let diL = 0, diR = 0;
    for (let i = 0; i < xPositions.length - 1; i++) {
      if (cx >= xPositions[i] && cx <= xPositions[i + 1]) { diL = i; diR = i + 1; break; }
      if (cx < xPositions[0]) { diL = 0; diR = 0; break; }
      if (cx > xPositions[xPositions.length - 1]) { diL = xPositions.length - 1; diR = diL; break; }
    }
    const t = (diL === diR) ? 0 : (cx - xPositions[diL]) / (xPositions[diR] - xPositions[diL]);
    const di = t < 0.5 ? diL : diR; // nearest index for value display
    const yr = YEARS[di];

    // Build stacked layer boundaries using interpolated Y positions
    // datasets are rendered bottom-to-top (index 0 = bottom)
    const layers = [];
    const chartBottom = area.bottom;
    let prevYInterp = chartBottom;

    chart.data.datasets.forEach((ds, dsi) => {
      const meta = chart.getDatasetMeta(dsi);
      if (meta.hidden) return;
      const val = ds.data[di] || 0;
      const ptL = meta.data[diL];
      const ptR = meta.data[diR];
      if (!ptL) return;
      const yInterp = (diL === diR) ? ptL.y : ptL.y + (ptR.y - ptL.y) * t;
      layers.push({
        ds, dsi, val, label: ds.label, bg: ds.backgroundColor,
        top: yInterp,     // top edge of this layer (smaller Y = higher on screen)
        bottom: prevYInterp // bottom edge
      });
      prevYInterp = yInterp;
    });

    if (!layers.length) { tt.classList.remove('show'); return; }

    // Items with non-zero values for tooltip display
    const items = layers.filter(l => l.val !== 0);
    if (!items.length) { tt.classList.remove('show'); return; }

    if (shiftHeld) {
      // All series mode
      const sorted = [...items].sort((a, b) => b.val - a.val);
      const total = sorted.reduce((s, it) => s + it.val, 0);
      let html = `<div class="chart-tt-title">ปี ${yr} — ทุก series (${sorted.length})</div><div class="chart-tt-body">`;
      sorted.forEach(it => {
        let yoyHtml = '';
        if (di > 0) {
          const prev = it.ds.data[di - 1] || 0;
          if (prev !== 0) {
            const pct = ((it.val - prev) / Math.abs(prev) * 100).toFixed(1);
            if (it.val > prev) yoyHtml = `<span class="chart-tt-yoy up">▲+${pct}%</span>`;
            else if (it.val < prev) yoyHtml = `<span class="chart-tt-yoy down">▼${pct}%</span>`;
          }
        }
        html += `<div class="chart-tt-row"><span class="chart-tt-dot" style="background:${it.bg}"></span><span class="chart-tt-name">${it.label}</span><span class="chart-tt-val">฿${it.val.toFixed(2)}M</span>${yoyHtml}</div>`;
      });
      html += `</div><div class="chart-tt-footer"><span>รวม ${sorted.length} รายการ</span><span>฿${total.toFixed(2)}M</span></div><div class="chart-tt-hint">เลื่อน scroll ได้ · ปล่อย Shift เพื่อปิด</div>`;
      tt.innerHTML = html;
    } else {
      // Single series: find which interpolated stacked band the mouse falls in
      let found = layers[layers.length - 1]; // default to top-most
      for (let i = 0; i < layers.length; i++) {
        if (cy >= layers[i].top && cy <= layers[i].bottom) {
          found = layers[i]; break;
        }
      }

      let yoyHtml = '';
      if (di > 0) {
        const prev = found.ds.data[di - 1] || 0;
        if (prev !== 0) {
          const pct = ((found.val - prev) / Math.abs(prev) * 100).toFixed(1);
          if (found.val > prev) yoyHtml = `<div class="chart-tt-row"><span class="chart-tt-yoy up">YoY: ▲ +${pct}%</span></div>`;
          else if (found.val < prev) yoyHtml = `<div class="chart-tt-row"><span class="chart-tt-yoy down">YoY: ▼ ${pct}%</span></div>`;
        }
      }
      tt.innerHTML = `<div class="chart-tt-title"><span class="chart-tt-dot" style="background:${found.bg};display:inline-block;vertical-align:middle;margin-right:6px"></span>${found.label}</div><div class="chart-tt-body"><div class="chart-tt-row"><span class="chart-tt-name">ปี ${yr}</span><span class="chart-tt-val">฿${found.val.toFixed(2)}M</span></div>${yoyHtml}</div><div class="chart-tt-hint">Shift ค้าง = ดูทุก series (scroll ได้)</div>`;
    }

    tt.classList.add('show');
    if (shiftHeld) {
      // Pin tooltip in place, allow pointer events for scrolling
      tt.classList.add('pinned');
      shiftPinned = true;
    } else {
      tt.classList.remove('pinned');
    }
    let tx = e.clientX + 16, ty = e.clientY - 10;
    const ttR = tt.getBoundingClientRect();
    if (tx + ttR.width + 10 > window.innerWidth) tx = e.clientX - ttR.width - 16;
    if (ty + ttR.height + 10 > window.innerHeight) ty = window.innerHeight - ttR.height - 10;
    if (ty < 10) ty = 10;
    tt.style.left = tx + 'px';
    tt.style.top = ty + 'px';
  });

  canvas.addEventListener('mouseleave', () => {
    if (!shiftPinned) document.getElementById('chartTt').classList.remove('show','pinned');
  });
}

function renderChart() {
  if (typeof Chart === 'undefined') return;

  // Filter records by selected filter values AND selected stack values
  const filtered = RECORDS.filter(r => selectedFilter.has(r[filterByKey]) && selectedStack.includes(r[stackByKey]));

  // Use selection order: first selected = bottom of stack
  const activeStacks = selectedStack.filter(sv => filtered.some(r => r[stackByKey] === sv));

  // Aggregate: per year per stack value
  const data = {};
  activeStacks.forEach(sv => { data[sv] = {}; });
  filtered.forEach(r => {
    const sv = r[stackByKey];
    if (!data[sv]) return;
    if (!data[sv][r.y]) data[sv][r.y] = 0;
    data[sv][r.y] += r.v;
  });

  const divisor = isMonthly ? 12e6 : 1e6;

  const datasets = activeStacks.map(sv => {
    const color = getDimColor(stackByKey, sv);
    return {
      label: sv.length > 30 ? sv.substring(0, 30) + '…' : sv,
      fullLabel: sv,
      data: YEARS.map(y => (data[sv][y] || 0) / divisor),
      backgroundColor: color + '4D',
      borderColor: '#64748b',
      borderWidth: 1,
      borderDash: [2, 2],
      fill: true,
      tension: 0.3,
      pointRadius: 5,
      pointHoverRadius: 9,
      pointHitRadius: 20,
      pointBackgroundColor: color,
      pointBorderColor: '#fff',
      pointBorderWidth: 1.5
    };
  });

  // Calculate actual data max for auto-unlock
  const yearTotals = YEARS.map(y => {
    return activeStacks.reduce((s, sv) => s + ((data[sv][y] || 0) / divisor), 0);
  });
  currentDataMax = Math.max(...yearTotals, 0);

  // Auto-unlock if data exceeds locked scale
  if (yLocked && yViewMax !== null && currentDataMax > yViewMax) {
    yLocked = false;
    yViewMin = null;
    yViewMax = null;
    document.getElementById('lockIcon').textContent = '🔓';
    document.getElementById('lockBtn').classList.remove('locked');
    document.getElementById('scaleLabel').textContent = 'Auto (ปลดล้อค)';
    setTimeout(() => { document.getElementById('scaleLabel').textContent = 'Auto'; }, 2000);
  }

  const ctx = document.getElementById('areaChart').getContext('2d');
  if (chartInstance) { chartInstance.destroy(); }
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: YEARS, datasets },
    options: {
      responsive: true,
      animation: false,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false, axis: 'x' },
      hover: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: { grid: { color: '#f1f5f9' }, ticks: { font: { family: 'JetBrains Mono', size: 13, weight: 'bold' } } },
        y: {
          stacked: true,
          min: (yLocked && yViewMin !== null) ? yViewMin : 0,
          max: (yLocked && yViewMax !== null) ? yViewMax : undefined,
          grid: { color: '#f1f5f9' },
          ticks: { font: { family: 'JetBrains Mono', size: 11 }, callback: v => '฿' + v.toFixed(0) + 'M' },
          title: { display: true, text: isMonthly ? 'ล้านบาท/เดือน (÷12)' : 'ล้านบาท/ปี', font: { family: 'Sarabun', size: 13 } }
        }
      }
    }
  });

  // Build custom scrollable legend
  const legEl = document.getElementById('chartLegend');
  legEl.innerHTML = '';
  [...datasets].reverse().forEach(ds => {
    const item = document.createElement('span');
    item.className = 'chart-legend-item';
    item.innerHTML = `<span class="chart-legend-dot" style="background:${ds.backgroundColor}"></span>${ds.label}`;
    legEl.appendChild(item);
  });
}

function treemapLayout(items, x, y, w, h) {
  if (!items.length) return [];
  const total = items.reduce((s, it) => s + Math.abs(it.value), 0);
  if (total === 0) return [];
  const rects = [];
  let remaining = [...items].sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
  let cx = x, cy = y, cw = w, ch = h;

  while (remaining.length > 0) {
    const isWide = cw >= ch;
    const side = isWide ? ch : cw;
    const remTotal = remaining.reduce((s, it) => s + Math.abs(it.value), 0);
    let row = [remaining[0]];
    let rowSum = Math.abs(remaining[0].value);

    function worst(row, rowSum) {
      const area = (rowSum / remTotal) * cw * ch;
      const s = isWide ? (area / side) : (area / side);
      if (s === 0) return Infinity;
      let mx = 0;
      row.forEach(it => {
        const itArea = (Math.abs(it.value) / remTotal) * cw * ch;
        const itSide = itArea / s;
        const r = Math.max(s / itSide, itSide / s);
        if (r > mx) mx = r;
      });
      return mx;
    }

    let i = 1;
    while (i < remaining.length) {
      const newRow = [...row, remaining[i]];
      const newSum = rowSum + Math.abs(remaining[i].value);
      if (worst(newRow, newSum) <= worst(row, rowSum)) {
        row = newRow;
        rowSum = newSum;
        i++;
      } else break;
    }

    const rowFrac = rowSum / remTotal;
    let off = 0;
    row.forEach(it => {
      const frac = Math.abs(it.value) / rowSum;
      let rx, ry, rw, rh;
      if (isWide) {
        const sw = cw * rowFrac;
        rx = cx; ry = cy + off * ch; rw = sw; rh = frac * ch;
        off += frac;
      } else {
        const sh = ch * rowFrac;
        rx = cx + off * cw; ry = cy; rw = frac * cw; rh = sh;
        off += frac;
      }
      rects.push({ ...it, x: rx, y: ry, w: rw, h: rh });
    });

    if (isWide) { cx += cw * rowFrac; cw -= cw * rowFrac; }
    else { cy += ch * rowFrac; ch -= ch * rowFrac; }
    remaining = remaining.slice(row.length);
  }
  return rects;
}

// Build hierarchy data for treemap 1: Dept → Category → Account → Product
function buildTmData1(selectedYears, path) {
  const levels = ['d', 'c', 'a', 'p'];
  return buildTmDataGeneric(selectedYears, path, levels);
}

// Build hierarchy data for treemap 2: Category → Dept → Account → Product
function buildTmData2(selectedYears, path) {
  const levels = ['c', 'd', 'a', 'p'];
  return buildTmDataGeneric(selectedYears, path, levels);
}

function buildTmDataGeneric(selectedYears, path, levels) {
  const yearsArr = [...selectedYears].sort();
  const n = yearsArr.length;
  const currentLevel = levels[path.length];
  if (!currentLevel) return [];

  // Collect per-year values for each group key
  const perYear = {}; // key -> { [year]: value }
  yearsArr.forEach(year => {
    let filtered = RECORDS.filter(r => r.y === year && r.v > 0);
    path.forEach((val, i) => { filtered = filtered.filter(r => r[levels[i]] === val); });
    const groups = {};
    filtered.forEach(r => {
      const k = r[currentLevel];
      groups[k] = (groups[k] || 0) + r.v;
    });
    Object.entries(groups).forEach(([name, value]) => {
      if (!perYear[name]) perYear[name] = {};
      perYear[name][year] = value;
    });
  });

  // Compute stats
  return Object.entries(perYear).map(([name, yearMap]) => {
    const vals = yearsArr.map(y => yearMap[y] || 0);
    const avg = vals.reduce((s, v) => s + v, 0) / n;
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const variance = vals.reduce((s, v) => s + (v - avg) ** 2, 0) / n;
    const sd = Math.sqrt(variance);
    return {
      name,
      key: currentLevel,
      value: avg,
      avg, min, max, sd,
      yearVals: vals,
      isMultiYear: n > 1
    };
  }).sort((a, b) => b.value - a.value);
}

// Get previous year value for YoY (only in single-year mode)
function getTmPrevVal(panelId, name, path) {
  if (tmSelectedYears.size > 1) return null; // no YoY in multi-year mode
  const tmYear = [...tmSelectedYears][0];
  const prevYr = getPrevYear(tmYear);
  if (!prevYr) return null;
  const buildFn = panelId === 1 ? buildTmData1 : buildTmData2;
  const prevData = buildFn(new Set([prevYr]), path);
  const found = prevData.find(d => d.name === name);
  return found ? found.value : 0;
}

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return h; }

// Color for treemap cells
const DEPT_COL_MAP = {};
/* DEPT_COL_MAP fill moved into initDataDerived() */
function getTmColor(key, name) {
  if (key === 'c') return SANKEY_CAT_COLORS[name] || SANKEY_PALETTE[Math.abs(hashStr(name)) % SANKEY_PALETTE.length];
  if (key === 'd') return DEPT_COL_MAP[name] || SANKEY_PALETTE[Math.abs(hashStr(name)) % SANKEY_PALETTE.length];
  return SANKEY_PALETTE[Math.abs(hashStr(name)) % SANKEY_PALETTE.length];
}

// Render a treemap panel
function renderTmPanel(panelId) {
  const boxEl = document.getElementById('tmBox' + panelId);
  const breadEl = document.getElementById('tmBread' + panelId);
  const path = tmPaths[panelId];
  const buildFn = panelId === 1 ? buildTmData1 : buildTmData2;
  const data = buildFn(tmSelectedYears, path);
  const total = data.reduce((s, d) => s + d.value, 0);

  // Grand total across selected years (average)
  const yearsArr = [...tmSelectedYears].sort();
  const nYears = yearsArr.length;
  const grandTotal = yearsArr.reduce((s, yr) => {
    return s + RECORDS.filter(r => r.y === yr && r.v > 0).reduce((ss, r) => ss + r.v, 0);
  }, 0) / nYears;

  const isMulti = nYears > 1;
  const yearLabel = isMulti ? `เฉลี่ย ${nYears} ปี (${yearsArr.join(',')})` : `ปี ${yearsArr[0]}`;

  // Breadcrumb
  const levelNames = panelId === 1
    ? ['ฝ่ายทั้งหมด', 'ฝ่าย/แผนก', 'หมวด', 'บัญชี', 'ผลิตภัณฑ์']
    : ['หมวด คชจ. ทั้งหมด', 'หมวด', 'ฝ่าย/แผนก', 'บัญชี', 'ผลิตภัณฑ์'];
  const levels = panelId === 1 ? ['d','c','a','p'] : ['c','d','a','p'];

  // Calculate % of grandTotal for each breadcrumb level
  function calcPathPct(subPath) {
    let filtered = [];
    yearsArr.forEach(year => {
      let f = RECORDS.filter(r => r.y === year && r.v > 0);
      subPath.forEach((val, i) => { f = f.filter(r => r[levels[i]] === val); });
      filtered = filtered.concat(f);
    });
    const sum = filtered.reduce((s, r) => s + r.v, 0) / nYears;
    return grandTotal > 0 ? Math.round((sum / grandTotal) * 100) : 0;
  }

  let bhtml = '';
  bhtml += `<span onclick="tmNav(${panelId},-1)">${levelNames[0]} (100%)</span>`;
  path.forEach((val, i) => {
    const pct = calcPathPct(path.slice(0, i + 1));
    const label = val.length > 15 ? val.substring(0,15)+'…' : val;
    bhtml += `<span class="sep">›</span><span onclick="tmNav(${panelId},${i})">${label} (${pct}%)</span>`;
  });
  // removed: no longer show current-level label at end of breadcrumb
  breadEl.innerHTML = bhtml;

  // Layout
  const rect = boxEl.getBoundingClientRect();
  const W = rect.width || 500;
  const H = 420;
  const rects = treemapLayout(data, 0, 0, W, H);

  boxEl.innerHTML = '';
  const tmDiv = tmIsMonthly ? 12 : 1;
  rects.forEach(r => {
    if (r.w < 2 || r.h < 2) return;
    const dispVal = r.value / tmDiv;
    const pctTotal = ((r.value / grandTotal) * 100).toFixed(1);
    const pctParent = ((r.value / total) * 100).toFixed(1);
    const prevVal = getTmPrevVal(panelId, r.name, path);
    const yoy = calcYoY(r.value, prevVal);
    const color = getTmColor(r.key, r.name);
    const canDrill = path.length < 3;

    // Build stats line for multi-year mode
    let statsHtml = '';
    let statsTooltip = '';
    if (isMulti) {
      const sdVal = r.sd / tmDiv;
      const minVal = r.min / tmDiv;
      const maxVal = r.max / tmDiv;
      statsHtml = `<div style="font-size:10px;opacity:.75;margin-top:1px;font-family:'JetBrains Mono',monospace;line-height:1.4">SD: ฿${fmtNum(sdVal)}<br>Min: ฿${fmtNum(minVal)} · Max: ฿${fmtNum(maxVal)}</div>`;
      statsTooltip = `\nSD: ฿${fmtFull(sdVal)}\nMin: ฿${fmtFull(minVal)} · Max: ฿${fmtFull(maxVal)}\nค่าแต่ละปี: ${r.yearVals.map((v,i) => yearsArr[i]+'=฿'+fmtNum(v/tmDiv)).join(', ')}`;
    }

    const cell = document.createElement('div');
    cell.className = 'tm-cell';
    cell.style.cssText = `left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;background:${color}88`;
    cell.innerHTML = `<div class="tm-cell-inner">
      ${r.w > 50 && r.h > 20 ? `<div class="tm-cell-name">${r.name}</div>` : ''}
      ${r.w > 60 && r.h > 35 ? `<div class="tm-cell-val">฿${fmtNum(dispVal)}${tmIsMonthly?'/เดือน':''}${isMulti?' (avg)':''}</div>` : ''}
      ${r.w > 70 && r.h > 48 ? `<div class="tm-cell-pct">${pctParent}% ของกลุ่ม · ${pctTotal}% ของทั้งหมด</div>` : ''}
      ${isMulti && r.w > 80 && r.h > 68 ? statsHtml : ''}
      ${!isMulti && r.w > 60 && r.h > 60 ? `<div class="tm-cell-yoy ${yoy.cls === 'yoy-up' ? 'up' : yoy.cls === 'yoy-down' ? 'down' : ''}">${yoy.label !== 'N/A' && yoy.label !== '—' ? 'YoY: ' + yoy.label : ''}</div>` : ''}
    </div>`;

    // Custom styled tooltip
    cell.addEventListener('mouseenter', e => {
      const tt = document.getElementById('tooltip');
      let html = `<div class="tt-title" style="border-left:4px solid ${color};padding-left:8px">${r.name}</div>`;
      html += `<div class="tt-row"><span class="tt-label">${isMulti?'เฉลี่ย':'จำนวนเงิน'}</span><span class="tt-val">฿${fmtFull(dispVal)}${tmIsMonthly?'/เดือน':''}</span></div>`;
      html += `<div class="tt-row"><span class="tt-label">% ของกลุ่ม</span><span class="tt-val">${pctParent}%</span></div>`;
      html += `<div class="tt-row"><span class="tt-label">% ของทั้งหมด</span><span class="tt-val">${pctTotal}%</span></div>`;
      if (isMulti) {
        const sdVal = r.sd / tmDiv;
        const minVal = r.min / tmDiv;
        const maxVal = r.max / tmDiv;
        html += `<div style="border-top:1px solid #e2e8f0;margin:6px 0 4px"></div>`;
        html += `<div class="tt-row"><span class="tt-label">SD</span><span class="tt-val">฿${fmtFull(sdVal)}</span></div>`;
        html += `<div class="tt-row"><span class="tt-label">Min</span><span class="tt-val">฿${fmtFull(minVal)}</span></div>`;
        html += `<div class="tt-row"><span class="tt-label">Max</span><span class="tt-val">฿${fmtFull(maxVal)}</span></div>`;
        html += `<div style="border-top:1px solid #e2e8f0;margin:6px 0 4px"></div>`;
        const sortedYears = yearsArr;
        r.yearVals.forEach((v, i) => {
          html += `<div class="tt-row"><span class="tt-label">ปี ${sortedYears[i]}</span><span class="tt-val" style="color:var(--text)">฿${fmtFull(v/tmDiv)}</span></div>`;
        });
      } else {
        if (yoy.label !== 'N/A' && yoy.label !== '—') {
          html += `<div class="tt-row"><span class="tt-label">YoY</span><span class="${yoy.cls}" style="font-family:'JetBrains Mono',monospace">${yoy.label}</span></div>`;
        }
      }
      if (canDrill) html += `<div style="margin-top:6px;font-size:11px;color:#64748b">🖱️ คลิกเพื่อ drill down</div>`;
      tt.innerHTML = html;
      tt.classList.add('show');
      moveTooltip(e);
    });
    cell.addEventListener('mousemove', moveTooltip);
    cell.addEventListener('mouseleave', () => hideTooltip());

    if (canDrill) {
      cell.onclick = () => { tmPaths[panelId] = [...path, r.name]; renderTmPanel(panelId); };
    }
    boxEl.appendChild(cell);
  });

  // Render Pareto chart
  renderPareto(panelId, data, grandTotal);
}

// Pareto chart instances
const paretoInstances = {};

function renderPareto(panelId, data, grandTotal) {
  if (typeof Chart === 'undefined') return;
  const canvasId = 'pareto' + panelId;
  const ctx = document.getElementById(canvasId).getContext('2d');

  if (paretoInstances[panelId]) paretoInstances[panelId].destroy();

  const sorted = [...data].sort((a, b) => b.value - a.value);
  const total = sorted.reduce((s, d) => s + d.value, 0);
  const pDiv = tmIsMonthly ? 12 : 1;
  const labels = sorted.map(d => d.name.length > 12 ? d.name.substring(0, 12) + '…' : d.name);
  const values = sorted.map(d => d.value / pDiv / 1e6);
  const isMulti = tmSelectedYears.size > 1;

  // Cumulative %
  let cum = 0;
  const cumPct = sorted.map(d => { cum += d.value; return (cum / total) * 100; });

  // Colors
  const colors = sorted.map(d => (getTmColor(d.key, d.name) || '#3b82f6') + '88');
  const borderColors = sorted.map(d => getTmColor(d.key, d.name) || '#3b82f6');

  paretoInstances[panelId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'มูลค่า (฿M)',
          data: values,
          backgroundColor: colors,
          borderColor: borderColors,
          borderWidth: 1,
          yAxisID: 'y',
          order: 2
        },
        {
          label: 'สะสม %',
          data: cumPct,
          type: 'line',
          borderColor: '#ef4444',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#ef4444',
          pointHitRadius: 10,
          tension: 0.2,
          yAxisID: 'y1',
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      animation: false,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,.97)',
          titleColor: '#1e293b', bodyColor: '#1e293b',
          borderColor: '#e2e8f0', borderWidth: 1,
          titleFont: { family: 'Sarabun', size: 12, weight: 'bold' },
          bodyFont: { family: 'JetBrains Mono', size: 11 },
          padding: 10,
          callbacks: {
            title: ctx => sorted[ctx[0].dataIndex].name,
            label: ctx => {
              const d = sorted[ctx.dataIndex];
              if (ctx.datasetIndex === 0) {
                let lbl = ' ฿' + ctx.parsed.y.toFixed(2) + 'M' + (tmIsMonthly?'/เดือน':'') + (isMulti?' (avg)':'') + ' (' + ((d.value / grandTotal) * 100).toFixed(1) + '%)';
                return lbl;
              }
              return ' สะสม: ' + ctx.parsed.y.toFixed(1) + '%';
            },
            afterBody: ctx => {
              if (!isMulti || ctx[0].datasetIndex !== 0) return '';
              const d = sorted[ctx[0].dataIndex];
              if (!d.sd && d.sd !== 0) return '';
              const sdVal = (d.sd / pDiv / 1e6).toFixed(2);
              const minVal = (d.min / pDiv / 1e6).toFixed(2);
              const maxVal = (d.max / pDiv / 1e6).toFixed(2);
              return [' SD: ฿' + sdVal + 'M', ' Min: ฿' + minVal + 'M · Max: ฿' + maxVal + 'M'];
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: 'Sarabun', size: 9 }, maxRotation: 45, minRotation: 0 }
        },
        y: {
          position: 'left',
          grid: { color: '#f1f5f9' },
          ticks: { font: { family: 'JetBrains Mono', size: 9 }, callback: v => '฿' + v.toFixed(0) + 'M' },
          title: { display: false }
        },
        y1: {
          position: 'right',
          min: 0, max: 105,
          grid: { display: false },
          ticks: { font: { family: 'JetBrains Mono', size: 9 }, callback: v => v + '%' },
          title: { display: false }
        }
      }
    }
  });
}

function tmNav(panelId, idx) {
  if (idx < 0) tmPaths[panelId] = [];
  else tmPaths[panelId] = tmPaths[panelId].slice(0, idx + 1);
  renderTmPanel(panelId);
}

function renderTreemaps() {
  renderTmPanel(1);
  renderTmPanel(2);
}

// ============ HEATMAP ============
let hmYear = '2564';
let hmBaseYear = null;   // comparison year; null => auto (previous year)
let hmRowOrder = null;   // depts sorted by 2564 total desc (fixed)
let hmColOrder = null;   // categories sorted by 2564 total desc (fixed)

function hmAgg(year) {
  // returns {dept:{cat:value}} plus dept totals & cat totals
  const cell = {}, dTot = {}, cTot = {};
  RECORDS.filter(r => r.y === year).forEach(r => {
    if (!cell[r.d]) cell[r.d] = {};
    cell[r.d][r.c] = (cell[r.d][r.c] || 0) + r.v;
    dTot[r.d] = (dTot[r.d] || 0) + r.v;
    cTot[r.c] = (cTot[r.c] || 0) + r.v;
  });
  return { cell, dTot, cTot };
}

function hmInitOrder() {
  if (hmRowOrder && hmColOrder) return;
  const base = hmAgg('2564');
  // include every dept & category that appears in ANY year, ranked by 2564 value (missing => 0, sorted last)
  const allDepts = [...new Set(RECORDS.map(r => r.d))];
  const allCats  = [...new Set(RECORDS.map(r => r.c))];
  hmRowOrder = allDepts.sort((a, b) => (base.dTot[b] || 0) - (base.dTot[a] || 0));
  hmColOrder = allCats.sort((a, b) => (base.cTot[b] || 0) - (base.cTot[a] || 0));
}

// background color from YoY pct: + => red ramp, - => green ramp, 0/na => neutral
function hmCellBg(yoy) {
  if (yoy === null || yoy === undefined || !isFinite(yoy)) return 'var(--surface)';
  const cap = 30; // % at which color is fully saturated
  const t = Math.min(1, Math.abs(yoy) / cap);
  if (yoy > 0) {
    // light pink -> strong red
    const r = Math.round(253 + (220 - 253) * t);
    const g = Math.round(226 + (38 - 226) * t);
    const b = Math.round(226 + (38 - 226) * t);
    return `rgb(${r},${g},${b})`;
  } else if (yoy < 0) {
    // light green -> strong green
    const r = Math.round(209 + (5 - 209) * t);
    const g = Math.round(240 + (150 - 240) * t);
    const b = Math.round(224 + (96 - 224) * t);
    return `rgb(${r},${g},${b})`;
  }
  return '#f1f5f9';
}
// pick readable text color for dark backgrounds
function hmValColor(yoy) {
  if (yoy === null || yoy === undefined || !isFinite(yoy)) return 'var(--text)';
  const cap = 30, t = Math.min(1, Math.abs(yoy) / cap);
  return t > 0.55 ? '#fff' : 'var(--text)';
}
function hmYoyClass(yoy) {
  if (yoy === null || yoy === undefined || !isFinite(yoy)) return 'na';
  if (yoy > 0.05) return 'up';
  if (yoy < -0.05) return 'down';
  return 'flat';
}
function fmtYoy(yoy) {
  if (yoy === null || yoy === undefined || !isFinite(yoy)) return '–';
  const s = yoy >= 0 ? '+' : '';
  return s + yoy.toFixed(1) + '%';
}
// resolve effective comparison year: explicit hmBaseYear, else previous year (auto)
function hmEffBase() {
  if (hmBaseYear && hmBaseYear !== hmYear) return hmBaseYear;
  if (hmBaseYear === hmYear) return null;        // same year selected => no comparison
  const i = YEARS.indexOf(hmYear);
  return i > 0 ? YEARS[i - 1] : null;            // auto = previous year
}

function buildHmYearTabs() {
  const el = document.getElementById('hmYearTabs');
  if (!el.childElementCount) {
    YEARS.forEach(y => {
      const b = document.createElement('button');
      b.className = 'hm-year-tab' + (y === hmYear ? ' active' : '');
      b.textContent = y;
      b.id = 'hmtab-' + y;
      b.onclick = () => hmSelectYear(y);
      el.appendChild(b);
    });
  }
  // comparison-year tabs (rebuilt each render so the active state + auto label stay correct)
  const bel = document.getElementById('hmBaseTabs');
  bel.innerHTML = '';
  const eff = hmEffBase();
  const autoYear = (() => { const i = YEARS.indexOf(hmYear); return i > 0 ? YEARS[i - 1] : null; })();
  // "อัตโนมัติ" chip
  const autoBtn = document.createElement('button');
  autoBtn.className = 'hm-year-tab' + (hmBaseYear === null ? ' active' : '');
  autoBtn.textContent = autoYear ? 'อัตโนมัติ' : 'ไม่มี';
  autoBtn.title = autoYear ? ('เทียบปีก่อนหน้า (' + autoYear + ')') : 'ปีฐาน ไม่มีปีก่อนหน้า';
  autoBtn.onclick = () => hmSelectBase(null);
  bel.appendChild(autoBtn);
  YEARS.forEach(y => {
    const b = document.createElement('button');
    const isActive = hmBaseYear === y;
    b.className = 'hm-year-tab' + (isActive ? ' active' : '') + (y === hmYear ? ' hm-self' : '');
    b.textContent = y;
    b.title = (y === hmYear) ? 'ปีเดียวกับปีหลัก (จะไม่มี %Δ)' : ('เทียบกับปี ' + y);
    b.onclick = () => hmSelectBase(y);
    bel.appendChild(b);
  });
}
function hmSelectYear(y) {
  hmYear = y;
  document.querySelectorAll('#hmYearTabs .hm-year-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('hmtab-' + y).classList.add('active');
  renderHeatmap();
}
function hmSelectBase(y) {
  hmBaseYear = y;   // null => auto
  renderHeatmap();
}

function renderHeatmap() {
  hmInitOrder();
  buildHmYearTabs();

  const cur = hmAgg(hmYear);
  const baseYr = hmEffBase();
  const prev = baseYr ? hmAgg(baseYr) : null;
  const hasYoy = prev !== null;
  // direction note when comparing against a LATER year (delta sign is still literal)
  const cmpNewer = hasYoy && YEARS.indexOf(baseYr) > YEARS.indexOf(hmYear);

  // info + legend
  const grand = hmRowOrder.reduce((s, d) => s + (cur.dTot[d] || 0), 0);
  document.getElementById('hmInfo').innerHTML =
    `รวม FC <span class="badge">฿${fmtNum(grand)}</span> · ` +
    (hasYoy ? `%Δ เทียบปี ${baseYr} → ${hmYear}` : 'แสดงเฉพาะค่าจริง (ไม่มีปีเทียบ)');
  document.getElementById('hmLegend').innerHTML = hasYoy
    ? `<div class="hm-leg-item"><span>%Δ ลด</span><span class="hm-leg-grad down"></span></div>
       <div class="hm-leg-item"><span class="hm-leg-grad up"></span><span>%Δ เพิ่ม</span></div>`
    : `<div class="hm-leg-item">ไม่มีปีเทียบ — แสดงเฉพาะค่าจริง</div>`;

  // build table
  let html = '<table class="hm-table"><thead><tr>';
  html += `<th class="hm-corner">ฝ่าย \\ หมวด</th>`;
  hmColOrder.forEach((c, i) => {
    const nm = c.replace(/^\d+\./, '');
    html += `<th class="hm-col"><span class="hm-col-rank">#${i + 1}</span><br><span class="hm-col-name">${nm}</span></th>`;
  });
  html += `<th class="hm-total-h">รวมฝ่าย</th></tr></thead><tbody>`;

  hmRowOrder.forEach((d, ri) => {
    html += `<tr><th class="hm-row"><span class="hm-row-rank">#${ri + 1}</span>${d}</th>`;
    hmColOrder.forEach(c => {
      const v = (cur.cell[d] && cur.cell[d][c] !== undefined) ? cur.cell[d][c] : null;
      let yoy = null, isNew = false;
      if (hasYoy && v !== null) {
        const pv = (prev.cell[d] && prev.cell[d][c] !== undefined) ? prev.cell[d][c] : null;
        if (pv !== null && pv !== 0) yoy = ((v - pv) / Math.abs(pv)) * 100;
        else if ((pv === null || pv === 0) && v !== 0) isNew = true;
      }
      if (v === null) {
        html += `<td class="hm-cell empty" style="background:var(--surface)"><span class="hm-val">–</span></td>`;
      } else {
        const bg = !hasYoy ? '#f8fafc' : (isNew ? 'rgb(220,38,38)' : hmCellBg(yoy));
        const vc = !hasYoy ? 'var(--text)' : (isNew ? '#fff' : hmValColor(yoy));
        const ttl = `${d} · ${c.replace(/^\d+\./,'')} (${hmYear}): ฿${fmtFull(v)}` +
          (hasYoy ? `\nปี ${baseYr}: ฿${(prev.cell[d]&&prev.cell[d][c]!==undefined)?fmtFull(prev.cell[d][c]):'ไม่มีข้อมูล'}\n%Δ: ${isNew?'ใหม่':fmtYoy(yoy)}` : '');
        html += `<td class="hm-cell" style="background:${bg}" title="${ttl.replace(/"/g,'&quot;')}">`;
        html += `<span class="hm-val" style="color:${vc}">฿${fmtNum(v)}</span>`;
        if (hasYoy) {
          if (isNew) {
            html += `<span class="hm-yoy" style="color:#fff">ใหม่</span>`;
          } else {
            const yc = hmYoyClass(yoy);
            const yoyColorStyle = (yc==='up'||yc==='down') && hmValColor(yoy)==='#fff' ? 'style="color:#fff"' : '';
            html += `<span class="hm-yoy ${yc}" ${yoyColorStyle}>Δ ${fmtYoy(yoy)}</span>`;
          }
        }
        html += `</td>`;
      }
    });
    // dept total
    const dt = cur.dTot[d] || 0;
    let dYoy = null;
    if (hasYoy) { const pdt = prev.dTot[d]; if (pdt) dYoy = ((dt - pdt) / Math.abs(pdt)) * 100; }
    html += `<td class="hm-cell hm-total" title="รวม ${d} (${hmYear}): ฿${fmtFull(dt)}${hasYoy?'\nปี '+baseYr+': ฿'+fmtFull(prev.dTot[d]||0)+'\n%Δ: '+fmtYoy(dYoy):''}"><span class="hm-val">฿${fmtNum(dt)}</span>`;
    if (hasYoy) html += `<span class="hm-yoy ${hmYoyClass(dYoy)}">Δ ${fmtYoy(dYoy)}</span>`;
    html += `</td></tr>`;
  });

  // total row
  html += `<tr class="hm-total-row"><th class="hm-row">รวมหมวด</th>`;
  hmColOrder.forEach(c => {
    const ct = cur.cTot[c] || 0;
    let cYoy = null;
    if (hasYoy) { const pct = prev.cTot[c]; if (pct) cYoy = ((ct - pct) / Math.abs(pct)) * 100; }
    html += `<td class="hm-cell" title="รวม ${c.replace(/^\d+\./,'')} (${hmYear}): ฿${fmtFull(ct)}${hasYoy?'\nปี '+baseYr+': ฿'+fmtFull(prev.cTot[c]||0)+'\n%Δ: '+fmtYoy(cYoy):''}"><span class="hm-val">฿${fmtNum(ct)}</span>`;
    if (hasYoy) html += `<span class="hm-yoy ${hmYoyClass(cYoy)}">Δ ${fmtYoy(cYoy)}</span>`;
    html += `</td>`;
  });
  // grand total
  let gYoy = null;
  if (hasYoy) {
    const pg = hmRowOrder.reduce((s, d) => s + (prev.dTot[d] || 0), 0);
    if (pg) gYoy = ((grand - pg) / Math.abs(pg)) * 100;
  }
  html += `<td class="hm-cell hm-total" title="รวมทั้งหมด (${hmYear}): ฿${fmtFull(grand)}"><span class="hm-val">฿${fmtNum(grand)}</span>`;
  if (hasYoy) html += `<span class="hm-yoy ${hmYoyClass(gYoy)}">Δ ${fmtYoy(gYoy)}</span>`;
  html += `</td></tr>`;

  html += `</tbody></table>`;
  document.getElementById('hmScroll').innerHTML = html;
}

// ============ VAULT: fetch + decrypt RECORDS ============
const VAULT_DATA_URL = "fc.enc.json"; // <-- ชื่อไฟล์ ciphertext ที่อยู่ข้างๆ (raw URL ก็ได้)
let vaultEnc = null;

function vb64ToBuf(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}

// แปลง CSV -> array ของ records (รองรับ quoted fields, comma/newline ในข้อความ)
function parseRecordsCSV(text){
  const rows = [];
  let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i];
    if (inQ){
      if (ch === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else inQ = false;
      } else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field); field = ""; }
      else if (ch === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if (ch === '\r'){ /* skip */ }
      else field += ch;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  const out = [];
  for (let r = 1; r < rows.length; r++){
    if (rows[r].length === 1 && rows[r][0] === "") continue; // ข้ามบรรทัดว่าง
    const obj = {};
    headers.forEach((h, ci) => {
      let val = rows[r][ci] !== undefined ? rows[r][ci] : "";
      if (h === "v"){ const n = parseFloat(val); val = isNaN(n) ? 0 : n; } // ค่าเงินเป็นตัวเลข
      obj[h] = val;
    });
    out.push(obj);
  }
  return out;
}

async function vaultLoadEnc(){
  if (vaultEnc) return vaultEnc;
  const res = await fetch(VAULT_DATA_URL, {cache:"no-store"});
  if (!res.ok) throw new Error("โหลดไฟล์ข้อมูลไม่สำเร็จ ("+res.status+")");
  vaultEnc = await res.json();
  return vaultEnc;
}

async function vaultUnlock(){
  const pw = document.getElementById("vaultPw").value;
  if (!pw) return;
  const btn = document.getElementById("vaultBtn"), err = document.getElementById("vaultErr");
  btn.textContent = "Decrypting…"; btn.disabled = true; err.textContent = "";
  try {
    const D = await vaultLoadEnc();
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:vb64ToBuf(D.salt), iterations:D.iter||600000, hash:"SHA-256"},
      km, {name:"AES-GCM", length:256}, false, ["decrypt"]
    );
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:vb64ToBuf(D.iv)}, key, vb64ToBuf(D.ct));
    let text = new TextDecoder().decode(pt);
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
    const t = text.trimStart();
    RECORDS = (t[0] === "[" || t[0] === "{") ? JSON.parse(text) : parseRecordsCSV(text);
    document.getElementById("vaultLock").remove();
    boot();
  } catch(e) {
    err.textContent = (e && e.message && e.message.indexOf("โหลด")>=0) ? e.message : "รหัสผ่านไม่ถูกต้อง";
    btn.textContent = "Unlock"; btn.disabled = false;
  }
}
document.getElementById("vaultPw").addEventListener("keydown", function(e){ if(e.key==="Enter") vaultUnlock(); });
