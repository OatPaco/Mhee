<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>benchmarking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Instrument Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#e0e0e6}
  .vault{text-align:center;max-width:380px;padding:2.5rem}
  .lock-icon{width:56px;height:56px;margin:0 auto 1.5rem;border:2px solid #3b3b4f;border-radius:16px;display:flex;align-items:center;justify-content:center;background:#13131d}
  .lock-icon svg{width:24px;height:24px;stroke:#7c7cff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  h1{font-size:1.25rem;font-weight:600;margin-bottom:.4rem;letter-spacing:-.02em}
  .sub{font-size:.85rem;color:#6a6a80;margin-bottom:1.8rem;font-family:'DM Mono',monospace}
  .field{position:relative;margin-bottom:1rem}
  input{width:100%;padding:.85rem 1rem;background:#13131d;border:1.5px solid #2a2a3d;border-radius:10px;color:#e0e0e6;font-size:.95rem;font-family:'DM Mono',monospace;outline:none;transition:border .2s}
  input:focus{border-color:#7c7cff}
  input::placeholder{color:#44445a}
  button{width:100%;padding:.85rem;background:#7c7cff;color:#0a0a0f;border:none;border-radius:10px;font-size:.95rem;font-weight:600;font-family:'Instrument Sans',sans-serif;cursor:pointer;transition:background .2s,transform .1s}
  button:hover{background:#9b9bff}
  button:active{transform:scale(.98)}
  .err{color:#ff6b6b;font-size:.8rem;margin-top:.6rem;font-family:'DM Mono',monospace;min-height:1.2em}
  .hint{margin-top:1.2rem;font-size:.72rem;color:#3b3b4f;font-family:'DM Mono',monospace}
</style>
</head>

const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pw=document.getElementById("pw").value;
  if(!pw)return;
  document.getElementById("btn").textContent="Decrypting…";
  document.getElementById("err").textContent="";
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(D.salt),iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(D.iv)},key,b64d(D.ct));
    document.open();document.write(new TextDecoder().decode(pt));document.close();
  }catch(e){
    document.getElementById("err").textContent="Wrong password";
    document.getElementById("btn").textContent="Unlock";
  }
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
