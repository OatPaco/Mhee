<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product &amp; Service Mix · Jan 2024 – Mar 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
<style>
  :root{
    --bg:#ffffff;
    --panel:#fafaf7;
    --panel-2:#f3f2ec;
    --ink:#1a1d24;
    --ink-dim:#6b6f78;
    --rule:#e3e1d8;
    --accent:#3a6ea8;
    --accent-2:#c8632e;
    --grid:#ececec;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(ellipse 80% 60% at 15% -10%, rgba(58,110,168,0.05), transparent 60%),
      radial-gradient(ellipse 70% 50% at 110% 10%, rgba(200,99,46,0.04), transparent 60%),
      var(--bg);
    min-height:100vh;
  }
  .wrap{max-width:1240px;margin:0 auto;padding:56px 40px 80px}
  header{border-bottom:1px solid var(--rule);padding-bottom:36px;margin-bottom:36px;display:flex;justify-content:space-between;align-items:flex-end;gap:40px;flex-wrap:wrap}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin:0 0 14px}
  h1{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(38px,5vw,62px);line-height:1.02;letter-spacing:-0.02em;margin:0;color:var(--ink)}

  .global-toggle{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px;padding:16px 22px;background:var(--panel);border:1px solid var(--rule);flex-wrap:wrap}
  .global-toggle .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim)}
  .seg{display:inline-flex;border:1px solid var(--rule);background:var(--bg)}
  .seg button{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;background:transparent;color:var(--ink-dim);border:0;padding:9px 18px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--accent);color:#fff}

  .window-bar{
    display:none;
    position:sticky;
    top:10px;
    z-index:50;
    align-items:center;
    gap:12px;
    margin:0 0 32px;
    padding:6px 14px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border:1px solid rgba(227,225,216,0.5);
    border-radius:8px;
    box-shadow:0 4px 18px -8px rgba(26,29,36,0.15);
    flex-wrap:wrap;
    transition:background .2s;
  }
  .window-bar:hover{background:rgba(255,255,255,0.55)}
  .window-bar.show{display:flex}
  .window-bar .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim)}
  .window-bar .seg{background:transparent}
  .window-bar .seg button{padding:5px 11px;font-size:10.5px}

  .nav-btn{font-family:'JetBrains Mono',monospace;font-size:14px;background:transparent;color:var(--ink);border:1px solid var(--rule);width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border-radius:3px;line-height:1}
  .nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:rgba(58,110,168,0.08)}
  .nav-btn:disabled{opacity:.3;cursor:not-allowed}

  .scrubber{flex:1;min-width:160px;height:32px;position:relative;cursor:pointer;display:flex;align-items:center;user-select:none;-webkit-user-select:none;touch-action:none;-ms-touch-action:none}
  .scrubber-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:3px;background:var(--grid);border-radius:2px}
  .scrubber-handle{position:absolute;top:50%;transform:translateY(-50%);height:12px;background:var(--accent);border-radius:3px;box-shadow:0 1px 4px -1px rgba(58,110,168,0.4);cursor:grab;transition:background .15s, box-shadow .15s, height .15s;min-width:26px;touch-action:none;-ms-touch-action:none}
  /* Invisible expanded hit area so fingers can grab the thin handle */
  .scrubber-handle::before{content:"";position:absolute;top:-14px;bottom:-14px;left:-6px;right:-6px}
  .scrubber-handle:hover{background:#2f5d92;height:14px}
  .scrubber-handle.dragging{cursor:grabbing;background:#2f5d92;box-shadow:0 2px 8px -1px rgba(58,110,168,0.55);height:14px}
  @media (hover:none) and (pointer:coarse){
    .scrubber-handle{height:18px}
    .scrubber-handle.dragging{height:20px}
  }

  .chart-block{margin-bottom:64px}
  .chart-head{display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px dashed var(--rule);flex-wrap:wrap}
  .chart-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;margin:0;letter-spacing:-0.01em}
  .chart-card{background:var(--panel);border:1px solid var(--rule);padding:24px 20px 18px;position:relative}
  .chart-canvas-wrap{position:relative;height:460px;cursor:grab}
  .chart-canvas-wrap:active{cursor:grabbing}
  .controls{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;justify-content:space-between;align-items:center}
  .ctl-group{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .ctl-group .glbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim);margin-right:4px}
  .ctl{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;background:transparent;color:var(--ink-dim);border:1px solid var(--rule);padding:7px 12px;cursor:pointer;transition:all .15s;border-radius:3px}
  .ctl:hover{color:var(--ink);border-color:var(--ink-dim)}
  .ctl.active{color:#fff;background:var(--accent);border-color:var(--accent)}
  .ma-group.disabled{opacity:.35;pointer-events:none}
  .ma-group.disabled .glbl::after{content:" · daily, stacked only";text-transform:none;letter-spacing:0;font-style:italic;color:var(--ink-dim);margin-left:4px}

  footer{margin-top:60px;padding-top:28px;border-top:1px solid var(--rule);display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);flex-wrap:wrap;gap:12px}
  footer span em{font-style:normal;color:var(--ink)}

  @media (max-width:780px){
    .wrap{padding:36px 20px 60px}
    .chart-canvas-wrap{height:380px}
    .window-bar{padding:6px 10px;gap:8px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="eyebrow">Volume Report · 27 months</p>
      <h1>Product &amp; Service</h1>
    </div>
  </header>

  <div class="global-toggle">
    <span class="lbl">View granularity</span>
    <div class="seg" id="granSeg">
      <button data-gran="monthly">Monthly</button>
      <button data-gran="daily" class="active">Daily</button>
    </div>
  </div>

  <div class="window-bar show" id="windowBar">
    <div class="seg" id="windowSeg">
      <button data-win="30">1m</button>
      <button data-win="90">3m</button>
      <button data-win="180">6m</button>
      <button data-win="365" class="active">1y</button>
      <button data-win="all">All</button>
    </div>
    <button class="nav-btn" id="navPrev" title="Previous">‹</button>
    <button class="nav-btn" id="navNext" title="Next">›</button>
    <div class="scrubber" id="scrubber" title="Drag to scroll">
      <div class="scrubber-track"></div>
      <div class="scrubber-handle" id="scrubberHandle"></div>
    </div>
  </div>

  <section class="chart-block">
    <div class="chart-head">
      <div>
        <h2 class="chart-title">PC — I-Shape + Square</h2>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-canvas-wrap"><canvas id="c1"></canvas></div>
      <div class="controls">
        <div class="ctl-group">
          <span class="glbl">Factory</span>
          <div id="factorySeg1"></div>
        </div>
        <div class="ctl-group ma-group" id="maGroup1" data-chart="1">
          <span class="glbl">MA</span>
          <button class="ctl" data-chart="1" data-ma="off">Off</button>
          <button class="ctl" data-chart="1" data-ma="50">50d</button>
          <button class="ctl" data-chart="1" data-ma="100">100d</button>
          <button class="ctl active" data-chart="1" data-ma="200">200d</button>
        </div>
        <div class="ctl-group">
          <button class="ctl active" data-chart="1" data-mode="stack">Stacked</button>
          <button class="ctl" data-chart="1" data-mode="100">100 %</button>
        </div>
      </div>
    </div>
  </section>

  <section class="chart-block">
    <div class="chart-head">
      <div>
        <h2 class="chart-title">SP — F1 + F2</h2>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-canvas-wrap"><canvas id="c2"></canvas></div>
      <div class="controls">
        <div class="ctl-group">
          <span class="glbl">Factory</span>
          <div id="factorySeg2"></div>
        </div>
        <div class="ctl-group ma-group" id="maGroup2" data-chart="2">
          <span class="glbl">MA</span>
          <button class="ctl" data-chart="2" data-ma="off">Off</button>
          <button class="ctl" data-chart="2" data-ma="50">50d</button>
          <button class="ctl" data-chart="2" data-ma="100">100d</button>
          <button class="ctl active" data-chart="2" data-ma="200">200d</button>
        </div>
        <div class="ctl-group">
          <button class="ctl active" data-chart="2" data-mode="stack">Stacked</button>
          <button class="ctl" data-chart="2" data-mode="100">100 %</button>
        </div>
      </div>
    </div>
  </section>

  <section class="chart-block">
    <div class="chart-head">
      <div>
        <h2 class="chart-title">Installation</h2>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-canvas-wrap"><canvas id="c3"></canvas></div>
      <div class="controls">
        <div class="ctl-group ma-group" id="maGroup3" data-chart="3">
          <span class="glbl">MA</span>
          <button class="ctl" data-chart="3" data-ma="off">Off</button>
          <button class="ctl" data-chart="3" data-ma="50">50d</button>
          <button class="ctl" data-chart="3" data-ma="100">100d</button>
          <button class="ctl active" data-chart="3" data-ma="200">200d</button>
        </div>
        <div class="ctl-group">
          <button class="ctl active" data-chart="3" data-mode="stack">Stacked</button>
          <button class="ctl" data-chart="3" data-mode="100">100 %</button>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <span>Source · <em>ProductServiceMix.xlsx</em></span>
    <span>Note · PD value on 29 Oct 2024 corrected from 2,563,266 to 256.3266</span>
  </footer>
</div>

// Pick color for a PC series by name (e.g. 'I22' or 'S30' or 'I-Other')
function pcColorFor(name, idxInProduct){
  const isI = name.startsWith('I');
  const palette = isI ? PALETTE_PC_I : PALETTE_PC_S;
  return palette[idxInProduct % palette.length];
}

// (PC: cool blues/greens + warm tans/reds; SP: mixed; Installation: blue/tan/olive).
// Saturated, distinctive, with adequate contrast on white when drawn as thin lines.
const MA_COLORS = {
  '50':  '#ff7a3d',   // bright orange  — short-term trend
  '100': '#6e3ea8',   // deep purple   — medium-term trend
  '200': '#e93a87'    // hot pink      — long-term trend
};

// Compute a simple moving average over an array.
// Returns array of same length where indices < period-1 are null (no MA available).
function movingAverage(arr, period){
  const out = new Array(arr.length).fill(null);
  if (period <= 1 || arr.length < period) return out;
  let runningSum = 0;
  for (let i = 0; i < arr.length; i++){
    runningSum += arr[i];
    if (i >= period) runningSum -= arr[i - period];
    if (i >= period - 1) out[i] = runningSum / period;
  }
  return out;
}

const fmt = n => {
  if (n === 0) return '0';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'k';
  return Math.round(n).toLocaleString();
};
const fmtFull = n => Math.round(n).toLocaleString();
// Volume formatter for tooltips: 1 decimal + unit, with thousand separators
const fmtVol = n => {
  if (n === 0) return '0.0 m³';
  const v = n.toFixed(1);
  const [intp, dec] = v.split('.');
  return intp.replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '.' + dec + ' m³';
};

// Month/Quarter divider plugin: in daily mode, draws thin dashed verticals at each
// month boundary (or quarter boundary if the window is wide) and a floating label.
const monthDividerPlugin = {
  id: 'monthDividers',
  afterDatasetsDraw(chart, args, opts){
    if (!opts || !opts.enabled) return;
    const xScale = chart.scales.x;
    if (!xScale) return;

    const dailyLabels = opts.labels;
    const xMin = Math.max(0, Math.floor(xScale.min ?? 0));
    const xMax = Math.min(dailyLabels.length - 1, Math.ceil(xScale.max ?? dailyLabels.length - 1));
    if (xMax <= xMin) return;

    const ctx = chart.ctx;
    const chartArea = chart.chartArea;
    const top = chartArea.top;
    const bottom = chartArea.bottom;
    const visible = xMax - xMin + 1;

    // Decide grouping: month vs quarter
    // Switch to quarters when window is large (>=270 days ≈ 9 months visible)
    const useQuarters = visible >= 270;

    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const boundaries = [];   // {idx, label, firstInWindow}

    if (useQuarters){
      // Quarter boundaries: months 1, 4, 7, 10 (i.e. Jan/Apr/Jul/Oct 1st)
      let lastKey = null;
      for (let i = xMin; i <= xMax; i++){
        const iso = dailyLabels[i];
        const y = iso.slice(0,4);
        const m = parseInt(iso.slice(5,7), 10);
        const q = Math.floor((m - 1) / 3) + 1;       // 1..4
        const key = `${y}-Q${q}`;
        if (key !== lastKey){
          boundaries.push({
            idx: i,
            firstInWindow: lastKey === null,
            // Show "Q1 '25" boundary only when this boundary aligns with a quarter start
            // We still label every section even if it doesn't start exactly on the quarter (e.g. windowStart)
            label: `Q${q} '${y.slice(2)}`
          });
          lastKey = key;
        }
      }
    } else {
      let lastMonth = null;
      for (let i = xMin; i <= xMax; i++){
        const iso = dailyLabels[i];
        const ym = iso.slice(0, 7);
        if (ym !== lastMonth){
          const m = parseInt(iso.slice(5,7), 10) - 1;
          const yy = iso.slice(2,4);
          boundaries.push({
            idx: i,
            firstInWindow: lastMonth === null,
            label: `${monthNames[m]} '${yy}`,
            // Split parts so we can fall back to a stacked two-line layout
            // when the section is too narrow for the full inline label.
            labelTop: monthNames[m],
            labelBottom: `'${yy}`
          });
          lastMonth = ym;
        }
      }
    }

    ctx.save();

    // 1) Dashed verticals (skip the very first boundary at left edge)
    ctx.strokeStyle = useQuarters ? 'rgba(107, 111, 120, 0.55)' : 'rgba(107, 111, 120, 0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    boundaries.forEach(b => {
      if (b.firstInWindow) return;
      const px = xScale.getPixelForValue(b.idx);
      if (px < chartArea.left || px > chartArea.right) return;
      ctx.beginPath();
      ctx.moveTo(px, top);
      ctx.lineTo(px, bottom);
      ctx.stroke();
    });
    ctx.setLineDash([]);

    // 2) Floating labels
    const fontSize = visible <= 35 ? 11 : (visible <= 100 ? 11 : (useQuarters ? 12 : 10));
    const lineGap = 1;       // px between stacked lines
    ctx.font = `500 ${fontSize}px "JetBrains Mono", monospace`;
    ctx.textBaseline = 'top';
    const fillColor = useQuarters ? '#c8632e' : '#3a6ea8';

    boundaries.forEach((b, i) => {
      const startIdx = b.idx;
      const nextIdx = (i + 1 < boundaries.length) ? boundaries[i+1].idx : xMax + 1;
      const startPx = xScale.getPixelForValue(Math.max(startIdx, xMin));
      const endPx = xScale.getPixelForValue(Math.min(nextIdx, xMax + 1));
      const centerPx = (Math.max(startPx, chartArea.left) + Math.min(endPx, chartArea.right)) / 2;
      const sectionWidth = Math.min(endPx, chartArea.right) - Math.max(startPx, chartArea.left);
      const padX = 6, padY = 3;
      const y = top + 6;

      // Try inline single-line first ("Nov '25")
      const fullWidth = ctx.measureText(b.label).width;
      if (sectionWidth >= fullWidth + 8){
        const x = centerPx - fullWidth/2;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillRect(x - padX, y - padY, fullWidth + padX*2, fontSize + padY*2);
        ctx.fillStyle = fillColor;
        ctx.fillText(b.label, x, y);
        return;
      }

      // Fall back to stacked two-line layout ("Nov" over "'25"), but only for month mode.
      // For quarter mode, the label is already compact — just skip if it can't fit inline.
      if (useQuarters || !b.labelTop || !b.labelBottom) return;

      const topW = ctx.measureText(b.labelTop).width;
      const botW = ctx.measureText(b.labelBottom).width;
      const blockW = Math.max(topW, botW);
      // Stacked layout needs the wider line + a tiny bit of padding to fit
      if (sectionWidth < blockW + 6) return;

      const blockH = fontSize * 2 + lineGap;
      const x = centerPx - blockW/2;
      // Background covers both lines
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillRect(x - padX, y - padY, blockW + padX*2, blockH + padY*2);
      ctx.fillStyle = fillColor;
      // Each line is individually centered within the block
      ctx.fillText(b.labelTop,    centerPx - topW/2, y);
      ctx.fillText(b.labelBottom, centerPx - botW/2, y + fontSize + lineGap);
    });

    ctx.restore();
  }
};
Chart.register(monthDividerPlugin);

// State
let granularity = 'daily';
const chartModes = {1:'stack', 2:'stack', 3:'stack'};
const factoryViews = {1:'all', 2:'all'};
// Moving-average overlay state: each chart has a Set of active periods ('50'|'100'|'200').
// Empty set = MA off. Multi-select allowed so users can compare e.g. 50d + 200d crossovers.
const maViews = {1: new Set(['200']), 2: new Set(['200']), 3: new Set(['200'])};
const charts = {};

const TOTAL_DAYS = DATA.daily_labels.length;
let windowSize = 365;
// windowStart defaults to the most-recent 6 months (i.e., right-edge anchored to today).
// Initialized after maxStart() is defined below.
let windowStart = 0;

function effectiveWindowSize(){ return windowSize === 'all' ? TOTAL_DAYS : Math.min(windowSize, TOTAL_DAYS); }
function maxStart(){ return Math.max(0, TOTAL_DAYS - effectiveWindowSize()); }
function clampStart(v){ return Math.max(0, Math.min(maxStart(), v)); }
// Anchor initial daily-view to the most recent 6 months
windowStart = maxStart();

function currentSeries(chartId){
  const key = 'chart'+chartId;
  if (chartId === '3') return DATA[key][granularity];
  return DATA[key][factoryViews[chartId]][granularity];
}
function currentLabels(){
  return granularity === 'monthly' ? DATA.monthly_labels : DATA.daily_labels;
}

// Find topmost non-zero dataset index per bar (for rounded top)
function computeTopIndices(series, length){
  const tops = new Array(length).fill(-1);
  for (let i = 0; i < length; i++){
    for (let d = series.length - 1; d >= 0; d--){
      if (series[d].data[i] > 0){
        tops[i] = d;
        break;
      }
    }
  }
  return tops;
}

// Display name for tooltip:
//  - PC (chart 1) names look like 'I22', 'S30', 'I-Other', 'S-Other'
//  - SP (chart 2) names are bare size strings (e.g. '300') or 'Others'
function sizeDisplay(name, chartId){
  if (chartId === '1'){
    if (name === 'I-Other') return 'I-Shape · Other';
    if (name === 'S-Other') return 'Square · Other';
    // 'I22' → 'I22'   'S52.5' → 'S52.5'  — return as-is (matches user's request)
    return name;
  }
  // SP / fallback
  if (name === 'Others') return 'Other sizes';
  return '⌀' + name;
}
function serviceDisplay(name){ return name; }

function buildDatasets(chartId, series, palette, isService=false){
  const daily = granularity === 'daily';
  const length = series[0]?.data.length || 0;
  const tops = computeTopIndices(series, length);
  const radius = daily ? 3 : 4;

  // For PC: separate index counters per product (I vs S) for palette selection
  let iIdx = 0, sIdx = 0;

  const barDatasets = series.map((s, i) => {
    const borderRadius = tops.map(topIdx => (topIdx === i ? radius : 0));
    // Resolve color
    let bg;
    if (chartId === '1'){
      if (s.name.startsWith('I')){
        bg = PALETTE_PC_I[iIdx % PALETTE_PC_I.length];
        iIdx++;
      } else {
        bg = PALETTE_PC_S[sIdx % PALETTE_PC_S.length];
        sIdx++;
      }
    } else {
      bg = palette[i % palette.length];
    }
    return {
      type: 'bar',
      label: s.name,
      data: s.data.slice(),
      backgroundColor: bg,
      borderColor: 'rgba(255,255,255,0.9)',
      borderWidth: daily ? 0 : 1,
      borderSkipped: false,
      borderRadius: borderRadius,
      barPercentage: daily ? 1.0 : 0.85,
      categoryPercentage: daily ? 1.0 : 0.85,
      _displayName: isService ? serviceDisplay(s.name) : sizeDisplay(s.name, chartId),
      _chartContext: CHART_CONTEXT[chartId],
      _isMA: false
    };
  });

  // Moving-average overlays — only in Daily + Stacked mode
  const showMA = daily && chartModes[chartId] === 'stack' && maViews[chartId].size > 0;
  const maDatasets = [];
  if (showMA){
    // Total daily volume = sum of all stacked series per day
    const totals = new Array(length).fill(0);
    for (const s of series){
      for (let i = 0; i < length; i++) totals[i] += s.data[i] || 0;
    }
    // One line dataset per active MA period
    const periods = Array.from(maViews[chartId]).sort((a,b) => parseInt(a) - parseInt(b));
    for (const p of periods){
      const period = parseInt(p, 10);
      const maData = movingAverage(totals, period);
      maDatasets.push({
        type: 'line',
        label: `${period}d MA`,
        data: maData,
        borderColor: MA_COLORS[p],
        backgroundColor: MA_COLORS[p],
        borderWidth: 2,
        borderCapStyle: 'round',
        borderJoinStyle: 'round',
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: MA_COLORS[p],
        pointHoverBorderColor: '#ffffff',
        pointHoverBorderWidth: 2,
        // Monotone cubic interpolation = smooth curve that never overshoots data points.
        // Combined with a small tension this gives the cleanest possible MA appearance
        // without distorting actual values.
        cubicInterpolationMode: 'monotone',
        tension: 0.4,
        spanGaps: false,
        // Don't participate in the bar stack
        stack: 'ma_' + p,
        order: -10,       // Draw on top of bars
        _isMA: true,
        _maPeriod: period,
        _displayName: `${period}d MA`
      });
    }
  }

  return barDatasets.concat(maDatasets);
}

function getYMax(chartId){
  // 100% mode always tops at 100, regardless of granularity or chart
  if (chartModes[chartId] === '100') return 100;
  // Daily-stacked caps (e.g., PC Combined = 470). Only apply in daily mode —
  // monthly totals are much larger, so let the axis auto-scale.
  if (granularity !== 'daily') return undefined;
  if (chartId === '3') return undefined;
  const cfg = Y_MAX['chart'+chartId];
  if (!cfg) return undefined;
  return cfg[factoryViews[chartId]];
}

function tooltipTitleText(chartId, xLabel){
  const ctx = CHART_CONTEXT[chartId];
  // Reformat ISO 'YYYY-MM-DD' → '15 Oct 2025'
  let display = xLabel;
  if (typeof xLabel === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(xLabel)){
    display = formatDate(xLabel);
  }
  return `${ctx} · ${display}`;
}

// Get per-factory contribution of a series at a given data index.
// chartId: '1' (PC) | '2' (SP). seriesName: 'I30', 'S52.5', '300', 'Others', etc.
// dataIdx: index into the daily or monthly arrays (matches granularity).
// Returns: array of {factory: 'F1'|'F3'|..., value: number} for non-zero contributors.
function factoryBreakdown(chartId, seriesName, dataIdx){
  if (chartId !== '1' && chartId !== '2') return [];
  const factories = DATA['chart'+chartId+'_factories'] || [];
  const out = [];
  for (const f of factories){
    const fView = DATA['chart'+chartId][f]?.[granularity];
    if (!fView) continue;
    const series = fView.find(s => s.name === seriesName);
    if (!series) continue;     // this size may not exist in this factory
    const v = series.data[dataIdx] || 0;
    if (v > 0) out.push({factory: f, value: v});
  }
  return out;
}

function baseOptions(chartId, isService=false){
  const daily = granularity === 'daily';
  let xMin, xMax;
  if (daily){
    xMin = windowStart;
    xMax = windowStart + effectiveWindowSize() - 1;
  }
  const visible = daily ? effectiveWindowSize() : 27;
  let tickLimit;
  if (visible <= 35) tickLimit = visible;
  else if (visible <= 100) tickLimit = 14;
  else if (visible <= 200) tickLimit = 12;
  else if (visible <= 400) tickLimit = 14;
  else tickLimit = 18;

  const yMax = getYMax(chartId);

  return {
    responsive:true,
    maintainAspectRatio:false,
    interaction:{mode:'nearest',intersect:true},
    animation:false,
    plugins:{
      legend:{
        position:'bottom',
        labels:{
          color:'#1a1d24',
          font:{family:'JetBrains Mono',size:11},
          boxWidth:12,boxHeight:12,padding:14,usePointStyle:false
        }
      },
      tooltip:{
        backgroundColor:'#1a1d24',
        titleColor:'#5b8fb9',
        bodyColor:'#fafaf7',
        borderColor:'#3a4150',
        borderWidth:1,
        cornerRadius:6,
        titleFont:{family:'Fraunces',size:13,weight:'400'},
        bodyFont:{family:'JetBrains Mono',size:13,weight:'500'},
        padding:12,
        boxPadding:6,
        displayColors:true,
        callbacks:{
          title: items => items.length ? tooltipTitleText(chartId, items[0].label) : '',
          label:(ctx)=>{
            const disp = ctx.dataset._displayName || ctx.dataset.label;
            const val = ctx.parsed.y;
            const isMA = !!ctx.dataset._isMA;
            const is100 = chartModes[chartId] === '100';
            // Moving averages are always in volume units (not %); never have factory breakdown.
            if (isMA){
              if (val == null) return null;       // hide pre-MA NaN points
              return `${disp}   ${fmtVol(val)}`;
            }
            const headLine = is100
              ? `${disp}   ${val.toFixed(1)}%`
              : `${disp}   ${fmtVol(val)}`;
            const lines = [headLine];
            // Factory breakdown — only in Stacked mode + Combined view
            // (% breakdown by factory would be confusing; volume is what's meaningful)
            if (!is100 && (chartId === '1' || chartId === '2') && factoryViews[chartId] === 'all'){
              const breakdown = factoryBreakdown(chartId, ctx.dataset.label, ctx.dataIndex);
              if (breakdown.length >= 2){
                for (const b of breakdown){
                  lines.push(`  └ Factory ${b.factory.slice(1)}   ${fmtVol(b.value)}`);
                }
              } else if (breakdown.length === 1){
                // Single contributor — show as a compact suffix instead of a sub-line
                lines[0] += `   (Factory ${breakdown[0].factory.slice(1)})`;
              }
            }
            return lines;
          }
        }
      },
      monthDividers: {
        enabled: daily,
        labels: DATA.daily_labels
      },
      zoom: daily ? {
        pan: {
          enabled: true,
          mode: 'x',
          threshold: 4,
          onPanStart: ({chart}) => {
            if (animFrame){ cancelAnimationFrame(animFrame); animFrame = null; }
          },
          onPan: ({chart}) => {
            const newMin = chart.scales.x.min;
            if (typeof newMin === 'number'){
              windowStart = clampStart(newMin);
              scheduleSiblingSync(chart);
            }
          },
          onPanComplete: () => {
            // Final clean sync + heavy summary update on release
            flushSiblingSync();
            updateSummary();
          }
        },
        zoom: { enabled: false },
        limits: {
          x: {min: 0, max: TOTAL_DAYS - 1, minRange: effectiveWindowSize() - 1}
        }
      } : {}
    },
    scales:{
      x:{
        type:'category',
        stacked:true,
        min: daily ? xMin : undefined,
        max: daily ? xMax : undefined,
        grid:{display:false},
        ticks:{
          color:'#6b6f78',
          font:{family:'JetBrains Mono',size:10},
          maxRotation:0,
          autoSkip:true,
          maxTicksLimit: tickLimit,
          callback: function(value, index){
            if (!daily) return this.getLabelForValue(value);
            // Daily: show just the day-of-month (month is rendered as floating label)
            const lbl = this.getLabelForValue(value);
            if (!lbl || typeof lbl !== 'string') return lbl;
            const parts = lbl.split('-');
            return parts.length === 3 ? String(parseInt(parts[2], 10)) : lbl;
          }
        }
      },
      y:{
        stacked:true,
        beginAtZero:true,
        max: yMax,
        grid:{color:'#ececec',drawBorder:false},
        ticks:{
          color:'#6b6f78',
          font:{family:'JetBrains Mono',size:10},
          callback:(v)=>fmt(v)
        },
        title:{display:true,text:'Volume',color:'#6b6f78',font:{family:'JetBrains Mono',size:10}}
      }
    }
  };
}

function makeChart(id, palette, isService){
  const ctx = document.getElementById('c'+id).getContext('2d');
  const series = currentSeries(id);
  charts[id] = new Chart(ctx, {
    type:'bar',
    data:{labels:currentLabels(), datasets:buildDatasets(id, series, palette, isService)},
    options:baseOptions(id, isService)
  });
  charts[id]._palette = palette;
  charts[id]._isService = !!isService;
  charts[id]._mode = 'stack';
}

function applyMode(id, mode){
  const ch = charts[id];
  const raw = currentSeries(id);
  const labels = currentLabels();

  ch.data.labels = labels;
  ch.data.datasets = buildDatasets(id, raw, ch._palette, ch._isService);
  ch.options = baseOptions(id, ch._isService);
  ch._mode = mode;

  if (mode === '100'){
    const totals = labels.map((_,m) => raw.reduce((s,sr)=>s+sr.data[m],0));
    ch.data.datasets.forEach((ds, di) => {
      // Clamp the result to [0, 100] to avoid floating-point overshoot (e.g. 100.00000001)
      // that could otherwise nudge Chart.js into extending the y-axis past 100.
      ds.data = raw[di].data.map((v,m) => {
        if (!totals[m]) return 0;
        const pct = v / totals[m] * 100;
        return pct > 100 ? 100 : pct;
      });
    });
    // For 100% mode, top is always present at 100% — recompute rounding tops for percentage data
    const tops = computeTopIndices(ch.data.datasets.map(d => ({data:d.data})), labels.length);
    ch.data.datasets.forEach((ds, di) => {
      const radius = granularity === 'daily' ? 3 : 4;
      ds.borderRadius = tops.map(t => t === di ? radius : 0);
    });
    // Hard-cap y-axis at exactly 100 with even 20-unit gridlines (0, 20, 40, 60, 80, 100)
    // — prevents Chart.js from auto-extending the upper bound past 100 to fit nice ticks.
    ch.options.scales.y.ticks.callback = v => v + '%';
    ch.options.scales.y.ticks.stepSize = 20;
    ch.options.scales.y.ticks.precision = 0;
    ch.options.scales.y.title.text = 'Share of '+(granularity==='monthly'?'month':'day')+' total';
    ch.options.scales.y.max = 100;
    ch.options.scales.y.min = 0;
    ch.options.scales.y.suggestedMax = 100;
    // Tooltip already handled by mode-aware label in baseOptions — no override needed here.
  }
  ch.update('none');
}

function panCharts(){
  if (granularity !== 'daily') return;
  const xMin = windowStart;
  const xMax = windowStart + effectiveWindowSize() - 1;
  const visible = effectiveWindowSize();
  let tickLimit;
  if (visible <= 35) tickLimit = visible;
  else if (visible <= 100) tickLimit = 14;
  else if (visible <= 200) tickLimit = 12;
  else if (visible <= 400) tickLimit = 14;
  else tickLimit = 18;
  for (const id of ['1','2','3']){
    const ch = charts[id];
    ch.options.scales.x.min = xMin;
    ch.options.scales.x.max = xMax;
    ch.options.scales.x.ticks.maxTicksLimit = tickLimit;
    // Refresh pan limits range
    if (ch.options.plugins.zoom?.limits){
      ch.options.plugins.zoom.limits.x.minRange = effectiveWindowSize() - 1;
    }
    ch.update('none');
  }
}

function rebuildAll(){
  ['1','2','3'].forEach(id => applyMode(id, chartModes[id]));
  updateSummary();
  updateWindowUI();
}

makeChart('1', PALETTE_SIZE, false);
makeChart('2', PALETTE_SIZE, false);
makeChart('3', PALETTE_INSTALL, true);

// Factory toggles
function buildFactorySeg(chartId, containerId){
  const factories = DATA['chart'+chartId+'_factories'];
  if (!factories || factories.length === 0) return;
  const container = document.getElementById(containerId);
  const seg = document.createElement('div');
  seg.className = 'seg';
  const options = [{val:'all', label:'Combined'}].concat(factories.map(f => ({val:f, label:'Factory '+f.slice(1)})));
  options.forEach(opt => {
    const b = document.createElement('button');
    b.textContent = opt.label;
    b.dataset.factory = opt.val;
    if (opt.val === 'all') b.classList.add('active');
    b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      factoryViews[chartId] = opt.val;
      applyMode(chartId, chartModes[chartId]);
      updateSummary();
    });
    seg.appendChild(b);
  });
  container.appendChild(seg);
}
buildFactorySeg('1','factorySeg1');
buildFactorySeg('2','factorySeg2');

// Mode buttons (Stacked / 100%) — scoped to data-mode so MA buttons aren't caught
document.querySelectorAll('.ctl[data-mode]').forEach(btn => {

// MA buttons — multi-select (each period toggles independently),
// except 'Off' which clears the set.

      const active = (v === 'off' && set.size === 0) || (v !== 'off' && set.has(v));
      b.classList.toggle('active', active);
    });
    applyMode(id, chartModes[id]);
  });
});

// Disable MA group when not in daily-stacked mode (MA is meaningless there).

  for (const id of ['1','2','3']){
    const group = document.getElementById('maGroup'+id);
    if (!group) continue;

// Window size
document.querySelectorAll('#windowSeg button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#windowSeg button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

      windowStart = clampStart(oldRight - windowSize);

// rAF-coalesced sibling-chart sync during native pan.
// onPan fires many times per drag — we batch all sibling updates to ≤ 1 per frame
// so the panned chart stays buttery while the other 2 catch up at vsync.
let syncRAF = null;
let syncChartRef = null;
function scheduleSiblingSync(panningChart){
  syncChartRef = panningChart;
  if (syncRAF) return;
  syncRAF = requestAnimationFrame(() => {
    syncRAF = null;
    const xMin = windowStart;
    const xMax = windowStart + effectiveWindowSize() - 1;
    for (const id of ['1','2','3']){
      const c = charts[id];
      if (c === syncChartRef) continue;
      c.options.scales.x.min = xMin;
      c.options.scales.x.max = xMax;
      c.update('none');
    }
    positionHandle();
  });
}
function flushSiblingSync(){
  if (syncRAF){ cancelAnimationFrame(syncRAF); syncRAF = null; }
  const xMin = windowStart;
  const xMax = windowStart + effectiveWindowSize() - 1;
  for (const id of ['1','2','3']){
    const c = charts[id];
    if (c === syncChartRef) continue;
    c.options.scales.x.min = xMin;
    c.options.scales.x.max = xMax;
    c.update('none');
  }
  positionHandle();
}

// Smooth animated panning for nav buttons + scrubber clicks
let animFrame = null;
let animTarget = null;
function animateTo(target){
  animTarget = clampStart(target);
  if (animFrame) return;
  const step = () => {
    const diff = animTarget - windowStart;
    if (Math.abs(diff) < 0.3){
      windowStart = animTarget;
      animFrame = null;
      panCharts();
      updateWindowUI();
      updateSummary();
      return;
    }
    // Slightly snappier than 0.22 for a more responsive feel
    windowStart += diff * 0.28;
    panCharts();
    updateWindowUI();
    animFrame = requestAnimationFrame(step);
  };
  animFrame = requestAnimationFrame(step);
}

document.getElementById('navPrev').addEventListener('click', () => {
  if (windowSize === 'all') return;
  animateTo(windowStart - Math.floor(effectiveWindowSize() / 2));
});
document.getElementById('navNext').addEventListener('click', () => {
  if (windowSize === 'all') return;
  animateTo(windowStart + Math.floor(effectiveWindowSize() / 2));
});

// Scrubber drag
const scrubber = document.getElementById('scrubber');
const handle = document.getElementById('scrubberHandle');
let dragging = false;
let dragOffset = 0;

function handleGeometry(){
  const trackRect = scrubber.getBoundingClientRect();
  const handleWidth = Math.max(26, (effectiveWindowSize() / TOTAL_DAYS) * trackRect.width);
  const usableWidth = trackRect.width - handleWidth;
  return {trackRect, handleWidth, usableWidth};
}
function positionHandle(){
  if (windowSize === 'all'){ handle.style.display = 'none'; return; }
  handle.style.display = '';
  const {handleWidth, usableWidth} = handleGeometry();
  const pct = maxStart() > 0 ? (windowStart / maxStart()) : 0;
  handle.style.width = handleWidth + 'px';
  handle.style.left = (pct * usableWidth) + 'px';
}
function pointerToStart(clientX, withOffset=true){
  const {trackRect, handleWidth, usableWidth} = handleGeometry();
  let x = clientX - trackRect.left - (withOffset ? dragOffset : handleWidth/2);
  x = Math.max(0, Math.min(usableWidth, x));
  const pct = usableWidth > 0 ? x / usableWidth : 0;
  return pct * maxStart();
}

handle.addEventListener('pointerdown', (e) => {
  if (windowSize === 'all') return;
  dragging = true;
  handle.classList.add('dragging');
  handle.setPointerCapture(e.pointerId);
  const rect = handle.getBoundingClientRect();
  dragOffset = e.clientX - rect.left;
  e.preventDefault();
});
handle.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const newStart = pointerToStart(e.clientX, true);
  windowStart = clampStart(newStart);
  if (animFrame){ cancelAnimationFrame(animFrame); animFrame = null; }
  // Coalesce: many pointermoves per frame → one chart update per frame
  if (!syncRAF){
    syncRAF = requestAnimationFrame(() => {
      syncRAF = null;
      panCharts();
      positionHandle();
    });
  }
});
const endDrag = (e) => {
  if (!dragging) return;
  dragging = false;
  handle.classList.remove('dragging');
  try{ handle.releasePointerCapture(e.pointerId); }catch{}
  updateSummary();
};
handle.addEventListener('pointerup', endDrag);
handle.addEventListener('pointercancel', endDrag);

scrubber.addEventListener('click', (e) => {
  if (windowSize === 'all') return;
  if (e.target === handle) return;
  const target = pointerToStart(e.clientX, false);
  animateTo(target);
});
window.addEventListener('resize', () => positionHandle());

function updateLabelOnly(){
  // No-op: month labels are drawn on the chart canvas itself now.
}
function updateWindowUI(){
  if (granularity !== 'daily') return;
  if (windowSize === 'all'){
    document.getElementById('navPrev').style.display = 'none';
    document.getElementById('navNext').style.display = 'none';
  } else {
    document.getElementById('navPrev').style.display = '';
    document.getElementById('navNext').style.display = '';
  }
  positionHandle();
  document.getElementById('navPrev').disabled = (windowStart <= 0.5);
  document.getElementById('navNext').disabled = (windowStart >= maxStart() - 0.5);
}
function formatDate(iso){
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
}

// Summary stats and per-chart meta were removed from the UI;
// keep updateSummary as a no-op so the many callers still work.
function updateSummary(){}
updateSummary();
updateWindowUI();
</script>
