<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACO Breakeven Analysis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f5f5f4;color:#1a1a1a;padding:12px;min-height:100vh}
.co{max-width:900px;margin:0 auto}
h1{font-size:16px;font-weight:600;margin-bottom:12px;color:#2c2c2a}
.tl{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #e0e0dc;flex-wrap:wrap}
.tl button{padding:6px 12px;font-size:16px;cursor:pointer;border:1px solid #c0c0ba;border-radius:8px;background:#fff;color:#1a1a1a;touch-action:manipulation}
.tl input[type=range]{flex:1;min-width:120px;cursor:pointer}
.ml{font-size:16px;font-weight:600;min-width:66px;text-align:center}
.sb{font-size:12px;padding:4px 10px;cursor:pointer;border:1px solid #c0c0ba;border-radius:6px;background:#fff;color:#555;touch-action:manipulation}
.sb.ac{background:#e6f1fb;color:#185fa5;border-color:#85b7eb}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.gr{grid-template-columns:1fr}}
.cd{background:#fff;border-radius:10px;border:1px solid #e0e0dc;padding:14px 16px}
.st{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.ir{display:flex;align-items:center;gap:6px;margin-bottom:8px;white-space:nowrap}
.il{font-size:13px;color:#666;width:80px;flex-shrink:0}
.iv{font-size:13px;font-weight:600;color:#1a1a1a;min-width:76px;text-align:right}
.iu{font-size:11px;color:#999;flex-shrink:0}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.me{background:#f5f5f4;border-radius:8px;padding:10px 12px}
.ml2{font-size:11px;color:#888;margin-bottom:3px}
.mv{font-size:17px;font-weight:600;color:#1a1a1a}
.mv.profit{color:#1d9e75}
.mv.loss{color:#d85a30}
.stb{margin-top:10px;padding:9px 12px;border-radius:8px;border:1px solid #e0e0dc;font-size:12px;line-height:1.5}
.cw{position:relative;width:100%;height:300px}
@media(max-width:640px){.cw{height:240px}}
.lg{display:flex;gap:14px;margin-top:8px;font-size:11px;color:#888;flex-wrap:wrap}
.lg span{display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="co">
<h1>PACO breakeven analysis — Jan ’25 to Mar ’26</h1>
<div class="tl">
<button id="pb" onclick="tp()">▶</button>
<input type="range" id="ts" min="0" max="1400" step="1" value="0" oninput="sc(+this.value)">
<span class="ml" id="ml"></span>
<button class="sb" onclick="ss(0.25,this)">0.5x</button>
<button class="sb" onclick="ss(0.375,this)">0.75x</button>
<button class="sb ac" onclick="ss(0.5,this)">1x</button>
<button class="sb" onclick="ss(1,this)">2x</button>
</div>
<div class="gr">
<div class="cd">
<div class="st">Monthly inputs</div>
<div class="ir"><span class="il">Selling price</span><span class="iv" id="spv"></span><span class="iu">฿/m³</span></div>
<div class="ir"><span class="il">Variable cost</span><span class="iv" id="vcv"></span><span class="iu">฿/m³</span></div>
<div class="ir"><span class="il">Fixed cost</span><span class="iv" id="fcv"></span><span class="iu">฿/mth</span></div>
<div class="ir"><span class="il">Production</span><span class="iv" id="vov"></span><span class="iu">m³/mth</span></div>
<div class="mg">
<div class="me"><div class="ml2">BEP volume</div><div class="mv" id="bv"></div></div>
<div class="me"><div class="ml2">BEP price</div><div class="mv" id="bp"></div></div>
<div class="me"><div class="ml2">Gross profit</div><div class="mv" id="gp"></div></div>
<div class="me"><div class="ml2">GP margin</div><div class="mv" id="ma"></div></div>
</div>
<div class="stb" id="sb"></div>
</div>
<div class="cd">
<div class="st">Cost-volume-profit chart</div>
<div class="cw"><canvas id="cc"></canvas></div>
<div class="lg">
<span><span style="width:16px;height:2px;background:#1d9e75;display:inline-block"></span>Revenue</span>
<span><span style="width:16px;height:2px;background:#d85a30;display:inline-block"></span>Total cost</span>
<span><span style="width:16px;height:0;border-top:1.5px dashed #888;display:inline-block"></span>Fixed cost</span>
<span><span style="width:16px;height:0;border-top:1.5px dashed #378add;display:inline-block"></span>Production</span>
</div>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var D=[{"l":"Jan '25","r":91213397,"v":60560910,"f":23354281,"p":14309,"s":6375,"u":4232},{"l":"Feb '25","r":85937313,"v":60566426,"f":23959353,"p":9690,"s":8869,"u":6250},{"l":"Mar '25","r":152896498,"v":87776494,"f":26592846,"p":18209,"s":8397,"u":4821},{"l":"Apr '25","r":120246738,"v":70360908,"f":30133610,"p":15338,"s":7840,"u":4587},{"l":"May '25","r":95563952,"v":55822044,"f":28687559,"p":15741,"s":6071,"u":3546},{"l":"Jun '25","r":99570396,"v":60629096,"f":28734620,"p":14040,"s":7092,"u":4318},{"l":"Jul '25","r":58522350,"v":38726375,"f":29381050,"p":9992,"s":5857,"u":3876},{"l":"Aug '25","r":78213519,"v":48966163,"f":32476763,"p":9606,"s":8142,"u":5097},{"l":"Sep '25","r":79525491,"v":51095399,"f":34320161,"p":8746,"s":9093,"u":5842},{"l":"Oct '25","r":75552426,"v":52293255,"f":26673634,"p":14344,"s":5267,"u":3646},{"l":"Nov '25","r":67375480,"v":46920288,"f":14271810,"p":9889,"s":6813,"u":4745},{"l":"Dec '25","r":58239780,"v":42953081,"f":25407542,"p":10169,"s":5727,"u":4224},{"l":"Jan '26","r":87294489,"v":56086210,"f":30061038,"p":13402,"s":6513,"u":4185},{"l":"Feb '26","r":100456213,"v":64112060,"f":29056500,"p":14321,"s":7015,"u":4477},{"l":"Mar '26","r":95176528,"v":56789023,"f":31952487,"p":13980,"s":6808,"u":4062}];
var ch,pl=false,ai=null,tv=0,sm=0.5,pt=0,SN=30,XM=24000,YM=200000000,TM=1400,FP=100,cP=0;
function fm(n){return Math.round(n).toLocaleString("en-US")}
function fM(n){return(n/1e6).toFixed(1)+"M \u0E3F"}
function lr(a,b,t){return a+(b-a)*t}
function gi(t){if(t>=TM)return D[14];var i=Math.floor(t/FP);if(i>=14)return D[14];var q=(t-i*FP)/FP,a=D[i],b=D[i+1];return{l:q<.5?a.l:b.l,s:lr(a.s,b.s,q),u:lr(a.u,b.u,q),f:lr(a.f,b.f,q),p:lr(a.p,b.p,q),r:lr(a.r,b.r,q),v:lr(a.v,b.v,q)}}
var pp={id:"pp",afterDraw:function(c){var x=c.ctx,a=c.chartArea,s=c.scales.x,px=s.getPixelForValue((cP/XM)*SN);if(px<a.left||px>a.right)return;x.save();x.beginPath();x.setLineDash([5,4]);x.lineWidth=1;x.strokeStyle="#378ADD";x.moveTo(px,a.top);x.lineTo(px,a.bottom);x.stroke();x.setLineDash([]);x.font="10px sans-serif";x.fillStyle="#185FA5";x.textAlign=px>a.right-64?"right":"left";x.fillText(fm(cP)+" m\u00B3",px>a.right-64?px-4:px+4,a.top+12);x.restore()}};
function rn(t){var d=gi(t);cP=d.p;document.getElementById("ml").textContent=d.l;document.getElementById("spv").textContent=fm(d.s);document.getElementById("vcv").textContent=fm(d.u);document.getElementById("fcv").textContent=fM(d.f);document.getElementById("vov").textContent=fm(d.p);var cm=d.s-d.u,bv=cm>0?d.f/cm:1/0,bp2=d.u+d.f/d.p,gp2=d.r-d.v-d.f,mp=d.r>0?(gp2/d.r*100):0;document.getElementById("bv").textContent=cm>0?fm(Math.round(bv))+" m\u00B3":"\u221E";document.getElementById("bp").textContent=fm(Math.round(bp2))+" \u0E3F";var ge=document.getElementById("gp");ge.textContent=(gp2>=0?"+":"")+fM(gp2);ge.className="mv "+(gp2>=0?"profit":"loss");var me=document.getElementById("ma");me.textContent=mp.toFixed(1)+"%";me.className="mv "+(gp2>=0?"profit":"loss");var sb=document.getElementById("sb");if(cm<=0){sb.style.background="rgba(216,90,48,.08)";sb.style.borderColor="#d85a30";sb.innerHTML="<span style=\"color:#993c1d;font-weight:600\">\u26A0 Selling price \u2264 variable cost</span>"}else if(d.p<bv){var g=Math.round(bv-d.p);sb.style.background="rgba(216,90,48,.08)";sb.style.borderColor="#d85a30";sb.innerHTML="<span style=\"color:#993c1d;font-weight:600\">Below breakeven</span> \u2014 need <strong>"+fm(g)+" more m\u00B3/mth</strong> to reach BEP of "+fm(Math.round(bv))+" m\u00B3"}else{var su=Math.round(d.p-bv);sb.style.background="rgba(29,158,117,.08)";sb.style.borderColor="#1d9e75";sb.innerHTML="<span style=\"color:#085041;font-weight:600\">Above breakeven</span> \u2014 safety margin of <strong>"+fm(su)+" m\u00B3/mth</strong> ("+((su/d.p)*100).toFixed(1)+"% of volume)"}var la=[],rd=[],td=[],fd=[];for(var i=0;i<=SN;i++){var v=Math.round((i/SN)*XM);la.push(fm(v));rd.push(Math.round(d.s*v));td.push(Math.round(d.f+d.u*v));fd.push(Math.round(d.f))}if(ch){ch.data.datasets[0].data=rd;ch.data.datasets[1].data=td;ch.data.datasets[2].data=fd;ch.update("none");return}ch=new Chart(document.getElementById("cc"),{type:"line",plugins:[pp],data:{labels:la,datasets:[{label:"Revenue",data:rd,borderColor:"#1d9e75",borderWidth:2,pointRadius:0,tension:0},{label:"Total cost",data:td,borderColor:"#d85a30",borderWidth:2,pointRadius:0,tension:0},{label:"Fixed cost",data:fd,borderColor:"#888",borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+fM(c.raw)}}}},scales:{x:{min:0,max:SN,ticks:{maxTicksLimit:7,autoSkip:true,color:"#888",font:{size:10},callback:function(v){return fm(Math.round((v/SN)*XM))}},title:{display:true,text:"Volume (m\u00B3/mth)",color:"#888",font:{size:10}},grid:{color:"rgba(136,135,128,.15)"}},y:{min:0,max:YM,ticks:{callback:function(v){return(v/1e6).toFixed(0)+"M"},color:"#888",font:{size:10},maxTicksLimit:7},title:{display:true,text:"Baht (\u0E3F)",color:"#888",font:{size:10}},grid:{color:"rgba(136,135,128,.15)"}}}}})}
function sc(v){tv=v;rn(tv)}
function tp(){pl=!pl;var b=document.getElementById("pb");if(pl){b.innerHTML="\u23F8";if(tv>=TM)tv=0;pt=0;ai=requestAnimationFrame(an)}else{b.innerHTML="\u25B6";if(ai)cancelAnimationFrame(ai);ai=null}}
function an(ts){if(!pl)return;if(pt===0)pt=ts;var dt=ts-pt;pt=ts;if(dt>100)dt=16;tv=tv+dt*.06*sm;if(tv>=TM){tv=TM;pl=false;document.getElementById("pb").innerHTML="\u25B6";rn(tv);document.getElementById("ts").value=Math.round(tv);return}document.getElementById("ts").value=Math.round(tv);rn(tv);ai=requestAnimationFrame(an)}
function ss(s,e){sm=s;var b=document.querySelectorAll(".sb");for(var i=0;i<b.length;i++)b[i].classList.remove("ac");e.classList.add("ac")}
rn(0);
</script>
</body>
</html>
