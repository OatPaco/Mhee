document.getElementById("btn").textContent="Decrypting…";document.getElementById("err").textContent="";
try{var e=new TextEncoder(),km=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]),
k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(D.salt),iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]),
pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(D.iv)},k,b64d(D.ct));
document.open();document.write(new TextDecoder().decode(pt));document.close();
}catch(x){document.getElementById("err").textContent="Wrong password";document.getElementById("btn").textContent="Unlock";}}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlock()});
